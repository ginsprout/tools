<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiチェック分割コピー版</title>
  <style>
    :root{
      --bg:#f6f3f8;
      --card:#ffffff;
      --ink:#2f2933;
      --muted:#756d79;
      --accent:#7a5c91;
      --accent-2:#ede4f3;
      --line:#ddd4e2;
      --danger:#b45567;
      --ok:#477a5f;
      --hi:#b56b89;
      --logic:#4f6f8f;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#f8f5fa 0%,#f3eef6 100%);
      color:var(--ink);
    }
    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:18px 14px 40px;
    }
    h1{
      margin:4px 0 6px;
      font-size:1.7rem;
    }
    .lead{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.7;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin:12px 0;
      box-shadow:0 8px 24px rgba(70,52,82,.06);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    @media (max-width:680px){
      .grid{grid-template-columns:1fr}
    }
    label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }
    input[type="file"], input[type="number"], textarea{
      width:100%;
      font:inherit;
    }
    input[type="number"]{
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }
    textarea{
      min-height:260px;
      resize:vertical;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      line-height:1.75;
      background:#fcfbfd;
      color:var(--ink);
    }
    .prompt-edit{min-height:220px}
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    button{
      border:0;
      border-radius:999px;
      padding:11px 16px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:white;
    }
    button.secondary{
      background:var(--accent-2);
      color:var(--ink);
    }
    button.hi{background:var(--hi)}
    button.logic{background:var(--logic)}
    button.ghost{
      background:#f2eff4;
      color:var(--ink);
    }
    button.danger{
      background:#f8e7eb;
      color:var(--danger);
    }
    button.done{
      background:#e6f3eb;
      color:var(--ok);
    }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .status{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }
    .badge{
      display:inline-block;
      padding:5px 9px;
      border-radius:999px;
      background:var(--accent-2);
      margin-right:6px;
      font-size:.9rem;
    }
    .progress{
      width:100%;
      height:10px;
      background:#eee7f1;
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }
    .bar{
      height:100%;
      width:0%;
      background:var(--accent);
      transition:width .2s;
    }
    .chunk-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }
    .chunk-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fcfbfd;
    }
    .chunk-item.active{
      outline:2px solid var(--accent);
      background:#f6f0fa;
    }
    .chunk-item.done{
      border-color:#bdd6c7;
      background:#f1f8f4;
    }
    .chunk-meta{
      font-size:.9rem;
      color:var(--muted);
    }
    .note{
      background:#fff9e9;
      border:1px solid #ead9a4;
      border-radius:12px;
      padding:10px 12px;
      line-height:1.6;
      color:#5f5331;
    }
    .hidden{display:none}
    .copy-status{
      min-height:1.4em;
      margin-top:8px;
      color:var(--ok);
      font-weight:700;
    }
    details summary{
      cursor:pointer;
      font-weight:700;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Hiチェック分割コピー版 🪶</h1>
  <p class="lead">
    原稿を細かく分割し、初回整文・続き整文・萌Hi・論理チェックの指示を付けてワンタップコピーします。
  </p>

  <div class="card">
    <div class="grid">
      <div>
        <label for="fileInput">1. 原稿ファイル</label>
        <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" />
      </div>
      <div>
        <label for="chunkSize">2. 目安文字数</label>
        <input id="chunkSize" type="number" min="300" max="5000" step="100" value="1200" />
      </div>
    </div>
    <div class="toolbar">
      <button id="splitBtn">自動分割する</button>
      <button id="resetBtn" class="danger">全部リセット</button>
    </div>
    <div id="fileStatus" class="status" style="margin-top:10px;">まだ原稿は読み込まれていません。</div>
  </div>

  <div id="workspace" class="hidden">
    <div class="card">
      <div>
        <span id="chunkBadge" class="badge">ブロック 0 / 0</span>
        <span id="charBadge" class="badge">0文字</span>
        <span id="doneBadge" class="badge">完了 0</span>
      </div>
      <div class="progress"><div id="progressBar" class="bar"></div></div>

      <div class="toolbar">
        <button id="copyEditFirstBtn">初回整文用にコピー</button>
        <button id="copyEditContinueBtn" class="secondary">続き整文用にコピー</button>
        <button id="copyHiBtn" class="hi">萌Hi用にコピー</button>
        <button id="copyLogicBtn" class="logic">論理チェック用にコピー</button>
        <button id="markDoneBtn" class="done">このブロック完了 → 次へ</button>
      </div>

      <div id="copyStatus" class="copy-status"></div>

      <div class="toolbar">
        <button id="prevBtn" class="secondary">← 前へ</button>
        <button id="nextBtn" class="secondary">次へ →</button>
        <button id="copyRawBtn" class="ghost">本文だけコピー</button>
      </div>
    </div>

    <div class="card">
      <label>現在のブロック</label>
      <textarea id="chunkBox" readonly></textarea>
      <div class="note" style="margin-top:10px;">
        コピーしても自動では次へ進みません。新しいチャットでは初回整文、同じチャットの2回目以降は続き整文を使います。
      </div>
    </div>

    <div class="card">
      <details>
        <summary>プロンプトを編集する（整文は差分一覧つき）</summary>
        <div style="margin-top:14px;">
          <label for="editPrompt">初回整文プロンプト</label>
          <textarea id="editPrompt" class="prompt-edit"></textarea>

          <label for="editContinuePrompt" style="margin-top:14px;">続き整文プロンプト</label>
          <textarea id="editContinuePrompt" class="prompt-edit"></textarea>

          <label for="hiPrompt" style="margin-top:14px;">萌Hiプロンプト</label>
          <textarea id="hiPrompt" class="prompt-edit"></textarea>

          <label for="logicPrompt" style="margin-top:14px;">論理チェックプロンプト</label>
          <textarea id="logicPrompt" class="prompt-edit"></textarea>

          <div class="toolbar">
            <button id="savePromptsBtn" class="secondary">この端末に保存</button>
            <button id="restorePromptsBtn" class="ghost">初期設定に戻す</button>
          </div>
          <p class="status">プロンプトはブラウザ内に保存されます。APIキーなどは使用しません。</p>
        </div>
      </details>
    </div>

    <div class="card">
      <label>ブロック一覧</label>
      <div id="chunkList" class="chunk-list"></div>
    </div>
  </div>
</div>

<script>
  const DEFAULT_EDIT_PROMPT = `以下の小説本文を整文してください。

・意味、展開、情報量は変えない
・キャラクターの口調や個性を保つ
・台詞や描写を勝手に追加しない
・冗長な重複、不自然な助詞、読みにくい語順を整える
・元のテンポ、行間、感情の強弱を残す
・必要以上に美文化しない
・変更が不要な箇所はそのまま残す

次の形式で出力してください。

【整文後全文】
整文後の本文を全文掲載してください。
変更した語句・文節だけを Markdown の太字（**変更箇所**）にしてください。
変更していない部分まで太字にせず、差分がひと目で分かるようにしてください。
句読点や空白だけの変更は、特に意味がなければ太字にしなくて構いません。

【変更箇所】
変更した箇所だけを、
「変更前」→「変更後」
の形式で箇条書きにしてください。
句読点や空白だけの変更は、特に意味がなければ省略してください。
変更がない場合は「変更なし」と記載してください。

【本文】`;

  const DEFAULT_EDIT_CONTINUE_PROMPT = `先ほどと同じ整文方針・出力形式で、以下の本文を整文してください。

内容とキャラクター性は変えず、語彙・語順・リズムを積極的に磨いてください。
変更した語句・文節だけを Markdown の太字で示してください。

【本文】`;

  const DEFAULT_HI_PROMPT = `以下の小説本文を、全力で壮大に萌Hiしてください。

この場面を読んだときの「うわあああ！」「ここが刺さる！」「この関係性がたまらない！」を、遠慮なく熱量高く言語化してください。

特に、
・キャラクターそれぞれの魅力
・二人や複数人の関係性の尊さ、危うさ、執着、信頼、すれ違い
・台詞や仕草ににじむ感情
・本人が自覚していない本音
・過去の積み重ねがこの場面にどう効いているか
・読者が息を呑む瞬間
・この先の展開への期待や不穏さ
・「ここでこのキャラがこれをする意味」
・場面全体が物語に与えるドラマチックな余韻

を具体的に拾ってください。

単なる要約や冷静な分析ではなく、読者として感情を大きく揺さぶられながら、なぜ刺さるのかを深く掘ってください。
無理に改善案を出さず、弱いところがある場合だけ最後に短く触れてください。

【本文】`;

  const DEFAULT_LOGIC_PROMPT = `以下の小説本文を、論理チェックしてください。

物語としての勢いは尊重しつつ、次の観点から矛盾や不自然さを具体的に確認してください。

・人物の行動や判断に筋が通っているか
・直前の状況や目的と矛盾していないか
・時間、距離、位置関係、移動に無理がないか
・誰が何を知っているかの整合性
・会話の受け答えが噛み合っているか
・因果関係が飛んでいないか
・読者だけが置いていかれる説明不足がないか
・同じ情報の重複や、逆に必要情報の欠落がないか
・伏線、設定、能力、ルールとの矛盾がないか
・キャラクターの感情変化に十分なきっかけがあるか

問題がある場合は、
1. 問題箇所
2. なぜ不自然か
3. 最小限の修正案
の順で示してください。

問題がなければ、無理に欠点を作らず「論理上の大きな問題なし」と明記してください。
本文の書き換えはしないでください。

【本文】`;

  const state = {
    filename: "untitled.md",
    originalText: "",
    chunks: [],
    current: 0,
    done: []
  };

  const el = id => document.getElementById(id);

  function normalizeText(text){
    return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  }

  function splitSmart(text, target){
    const paragraphs = normalizeText(text).split(/\n{2,}/);
    const chunks = [];
    let current = "";

    for(const para of paragraphs){
      const block = para.trim();
      if(!block) continue;

      const candidate = current ? current + "\n\n" + block : block;

      if(candidate.length <= target){
        current = candidate;
      }else{
        if(current) chunks.push(current);

        if(block.length <= target * 1.35){
          current = block;
        }else{
          const sentences = block.split(/(?<=[。！？!?」』）\)])\s*/);
          let temp = "";

          for(const sentence of sentences){
            if((temp + sentence).length <= target){
              temp += sentence;
            }else{
              if(temp) chunks.push(temp.trim());
              temp = sentence;
            }
          }
          current = temp.trim();
        }
      }
    }

    if(current) chunks.push(current);
    return chunks.filter(Boolean);
  }

  function loadPrompts(){
    el("editPrompt").value = localStorage.getItem("hi_edit_prompt_v4") || DEFAULT_EDIT_PROMPT;
    el("editContinuePrompt").value = localStorage.getItem("hi_edit_continue_prompt_v1") || DEFAULT_EDIT_CONTINUE_PROMPT;
    el("hiPrompt").value = localStorage.getItem("hi_hi_prompt_v4") || DEFAULT_HI_PROMPT;
    el("logicPrompt").value = localStorage.getItem("hi_logic_prompt_v4") || DEFAULT_LOGIC_PROMPT;
  }

  function updateUI(){
    if(!state.chunks.length) return;

    const i = state.current;
    el("chunkBox").value = state.chunks[i];
    el("chunkBadge").textContent = `ブロック ${i + 1} / ${state.chunks.length}`;
    el("charBadge").textContent = `${state.chunks[i].length}文字`;

    const doneCount = state.done.filter(Boolean).length;
    el("doneBadge").textContent = `完了 ${doneCount}`;
    el("progressBar").style.width = `${Math.round(doneCount / state.chunks.length * 100)}%`;

    el("prevBtn").disabled = i === 0;
    el("nextBtn").disabled = i === state.chunks.length - 1;
    el("markDoneBtn").textContent = state.done[i]
      ? "完了済み・次へ"
      : "このブロック完了 → 次へ";

    el("copyStatus").textContent = "";
    renderChunkList();
  }

  function renderChunkList(){
    const list = el("chunkList");
    list.innerHTML = "";

    state.chunks.forEach((chunk, idx) => {
      const item = document.createElement("div");
      item.className = "chunk-item" +
        (idx === state.current ? " active" : "") +
        (state.done[idx] ? " done" : "");

      item.innerHTML = `
        <div>
          <strong>ブロック ${idx + 1}</strong>
          <div class="chunk-meta">
            ${chunk.length}文字
            ${state.done[idx] ? "・完了" : ""}
          </div>
        </div>
        <button class="secondary" data-idx="${idx}">開く</button>
      `;

      item.querySelector("button").addEventListener("click", () => {
        state.current = idx;
        updateUI();
        window.scrollTo({top: el("workspace").offsetTop - 10, behavior:"smooth"});
      });

      list.appendChild(item);
    });
  }

  async function copyText(text, message){
    try{
      await navigator.clipboard.writeText(text);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    el("copyStatus").textContent = message;
  }

  function buildText(prompt){
    return `${prompt.trim()}\n\n${state.chunks[state.current]}`;
  }

  el("fileInput").addEventListener("change", async e => {
    const file = e.target.files[0];
    if(!file) return;

    state.filename = file.name;
    state.originalText = normalizeText(await file.text());
    el("fileStatus").textContent =
      `${file.name} を読み込みました（${state.originalText.length}文字）`;
  });

  el("splitBtn").addEventListener("click", () => {
    if(!state.originalText.trim()){
      alert("先に原稿ファイルを読み込んでください。");
      return;
    }

    const target = Math.max(300, Number(el("chunkSize").value || 1200));
    state.chunks = splitSmart(state.originalText, target);
    state.current = 0;
    state.done = new Array(state.chunks.length).fill(false);

    el("workspace").classList.remove("hidden");
    updateUI();
  });

  el("copyEditFirstBtn").addEventListener("click", () => {
    copyText(
      buildText(el("editPrompt").value),
      "初回整文用をコピーしました。このチャットの最初に使います。"
    );
  });

  el("copyEditContinueBtn").addEventListener("click", () => {
    copyText(
      buildText(el("editContinuePrompt").value),
      "続き整文用をコピーしました。同じチャットの2回目以降に使います。"
    );
  });

  el("copyHiBtn").addEventListener("click", () => {
    copyText(
      buildText(el("hiPrompt").value),
      "萌Hi用をコピーしました。チャト美、壮大に転がれアピ。"
    );
  });

  el("copyLogicBtn").addEventListener("click", () => {
    copyText(
      buildText(el("logicPrompt").value),
      "論理チェック用をコピーしました。チャト男、冷静に頼むアピ。"
    );
  });

  el("copyRawBtn").addEventListener("click", () => {
    copyText(
      state.chunks[state.current],
      "本文だけコピーしました。"
    );
  });

  el("markDoneBtn").addEventListener("click", () => {
    state.done[state.current] = true;

    if(state.current < state.chunks.length - 1){
      state.current++;
      updateUI();
    }else{
      updateUI();
      el("copyStatus").textContent = "全ブロック完了です。おつかれアピ！";
    }
  });

  el("prevBtn").addEventListener("click", () => {
    if(state.current > 0){
      state.current--;
      updateUI();
    }
  });

  el("nextBtn").addEventListener("click", () => {
    if(state.current < state.chunks.length - 1){
      state.current++;
      updateUI();
    }
  });

  el("savePromptsBtn").addEventListener("click", () => {
    localStorage.setItem("hi_edit_prompt_v4", el("editPrompt").value);
    localStorage.setItem("hi_edit_continue_prompt_v1", el("editContinuePrompt").value);
    localStorage.setItem("hi_hi_prompt_v4", el("hiPrompt").value);
    localStorage.setItem("hi_logic_prompt_v4", el("logicPrompt").value);
    el("copyStatus").textContent = "4種類のプロンプトをこの端末に保存しました。";
  });

  el("restorePromptsBtn").addEventListener("click", () => {
    el("editPrompt").value = DEFAULT_EDIT_PROMPT;
    el("editContinuePrompt").value = DEFAULT_EDIT_CONTINUE_PROMPT;
    el("hiPrompt").value = DEFAULT_HI_PROMPT;
    el("logicPrompt").value = DEFAULT_LOGIC_PROMPT;
    localStorage.removeItem("hi_edit_prompt_v4");
    localStorage.removeItem("hi_edit_continue_prompt_v1");
    localStorage.removeItem("hi_hi_prompt_v4");
    localStorage.removeItem("hi_logic_prompt_v4");
    el("copyStatus").textContent = "初期プロンプトに戻しました。";
  });

  el("resetBtn").addEventListener("click", () => {
    if(!confirm("原稿と進捗を全部リセットしますか？")) return;

    state.filename = "untitled.md";
    state.originalText = "";
    state.chunks = [];
    state.current = 0;
    state.done = [];

    el("fileInput").value = "";
    el("fileStatus").textContent = "まだ原稿は読み込まれていません。";
    el("workspace").classList.add("hidden");
  });

  loadPrompts();
</script>
</body>
</html>

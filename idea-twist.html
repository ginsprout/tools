<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイデア昇華ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Serif+JP:wght@300;600&display=swap');

  :root {
    --bg: #0e0c18;
    --surface: #16132a;
    --surface2: #1e1a38;
    --border: #2e2950;
    --text: #e8e2f8;
    --text-dim: #7d76a8;
    --gold: #e8c44a;
    --gold-soft: rgba(232,196,74,0.12);
    --violet: #9b6fff;
    --violet-soft: rgba(155,111,255,0.12);
    --teal: #3fd6c0;
    --teal-soft: rgba(63,214,192,0.1);
    --rose: #ff6b8a;
    --rose-soft: rgba(255,107,138,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(155,111,255,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(63,214,192,0.05) 0%, transparent 50%);
  }

  header {
    padding: 32px 24px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    background: var(--gold-soft);
    border: 1px solid rgba(232,196,74,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1.4;
    background: linear-gradient(135deg, var(--text) 0%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  header p {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* Input */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 20px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--violet);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    resize: none;
    outline: none;
    min-height: 80px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--violet); }
  textarea::placeholder { color: var(--text-dim); }

  /* Frame selector */
  .frame-section { margin-top: 16px; }

  .frame-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .frames {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }

  .frame-chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .frame-chip:hover { border-color: var(--violet); color: var(--violet); background: var(--violet-soft); }
  .frame-chip.active { border-color: var(--violet); color: var(--violet); background: var(--violet-soft); }

  .frame-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }

  .btn-run {
    width: 100%;
    margin-top: 18px;
    padding: 16px;
    background: linear-gradient(135deg, var(--violet), #6b3fd4);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .btn-run:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(155,111,255,0.3); }
  .btn-run:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none; }

  /* Loading */
  .loading { display: none; text-align: center; padding: 48px 20px; }
  .loading.show { display: block; }

  .loading-icon {
    font-size: 32px;
    animation: pulse 1.2s ease-in-out infinite;
    display: block;
    margin-bottom: 16px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
  }

  .loading p { font-size: 13px; color: var(--text-dim); }

  /* Results */
  .results { display: none; }
  .results.show { display: block; }

  .results-header {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .idea-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 14px;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .idea-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .idea-card.type-game::before { background: linear-gradient(90deg, var(--violet), var(--teal)); }
  .idea-card.type-story::before { background: linear-gradient(90deg, var(--gold), var(--rose)); }
  .idea-card.type-ritual::before { background: linear-gradient(90deg, var(--teal), var(--violet)); }
  .idea-card.type-mystery::before { background: linear-gradient(90deg, var(--rose), var(--gold)); }
  .idea-card.type-other::before { background: linear-gradient(90deg, var(--violet), var(--rose)); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .idea-card:nth-child(1) { animation-delay: 0.05s; }
  .idea-card:nth-child(2) { animation-delay: 0.15s; }
  .idea-card:nth-child(3) { animation-delay: 0.25s; }

  .idea-frame-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .type-game .idea-frame-badge { background: var(--violet-soft); color: var(--violet); border: 1px solid rgba(155,111,255,0.3); }
  .type-story .idea-frame-badge { background: var(--gold-soft); color: var(--gold); border: 1px solid rgba(232,196,74,0.3); }
  .type-ritual .idea-frame-badge { background: var(--teal-soft); color: var(--teal); border: 1px solid rgba(63,214,192,0.3); }
  .type-mystery .idea-frame-badge { background: var(--rose-soft); color: var(--rose); border: 1px solid rgba(255,107,138,0.3); }
  .type-other .idea-frame-badge { background: var(--violet-soft); color: var(--violet); border: 1px solid rgba(155,111,255,0.3); }

  .idea-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 12px;
    color: var(--text);
  }

  .idea-scenario {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text-dim);
    margin-bottom: 14px;
    border-left: 2px solid var(--border);
    padding-left: 14px;
  }

  .idea-why {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text-dim);
  }

  .idea-why strong {
    color: var(--text);
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .error-msg {
    background: var(--rose-soft);
    border: 1px solid rgba(255,107,138,0.3);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    color: var(--rose);
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <div class="header-badge">✦ Idea Alchemy</div>
  <h1>アイデアを1段階<br>ひねり上げる</h1>
  <p>「パーツカードを作る」を<br>「RPGのモブにインタビューしてクエストをこなしたら作文が書けてた」へ。</p>
</header>

<div class="main">

  <div class="card">
    <div class="card-label">🌀 ひねり上げたいアイデアを入力</div>
    <textarea id="input" placeholder="例：作文が書けない子に、書く内容をカードに分けて並べさせる&#10;例：順番が待てない子にタイマーで可視化する" rows="3"></textarea>

    <div class="frame-section">
      <div class="frame-label">変換フレーム（複数選択可・未選択でAIが選ぶ）</div>
      <div class="frames">
        <button class="frame-chip" data-frame="RPG・ゲーム">⚔️ RPG・ゲーム</button>
        <button class="frame-chip" data-frame="物語・冒険">📖 物語・冒険</button>
        <button class="frame-chip" data-frame="魔法・儀式">✨ 魔法・儀式</button>
        <button class="frame-chip" data-frame="探偵・謎解き">🔍 探偵・謎解き</button>
        <button class="frame-chip" data-frame="料理・レシピ">🍳 料理・レシピ</button>
        <button class="frame-chip" data-frame="宇宙・SF">🚀 宇宙・SF</button>
        <button class="frame-chip" data-frame="お店・商店街">🏪 お店・商店街</button>
        <button class="frame-chip" data-frame="スポーツ・試合">🏆 スポーツ・試合</button>
      </div>
      <div class="frame-hint" id="frameHint">未選択：AIが最適なフレームを選びます</div>
    </div>

    <button class="btn-run" id="runBtn" onclick="twist()">✦ ひねり上げる</button>
  </div>

  <div class="loading" id="loading">
    <span class="loading-icon">🔮</span>
    <p>アイデアを錬金中…</p>
  </div>

  <div class="results" id="results">
    <div class="results-header">✦ 変換されたアイデア</div>
    <div id="cards"></div>
  </div>

</div>

<script>
  // Frame selection
  const selectedFrames = new Set();

  document.querySelectorAll('.frame-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const frame = chip.dataset.frame;
      if (selectedFrames.has(frame)) {
        selectedFrames.delete(frame);
        chip.classList.remove('active');
      } else {
        selectedFrames.add(frame);
        chip.classList.add('active');
      }
      const hint = document.getElementById('frameHint');
      hint.textContent = selectedFrames.size === 0
        ? '未選択：AIが最適なフレームを選びます'
        : `選択中：${[...selectedFrames].join('・')}`;
    });
  });

  // Frame → type class mapping
  const frameTypeMap = {
    'RPG・ゲーム': 'game',
    '物語・冒険': 'story',
    '魔法・儀式': 'ritual',
    '探偵・謎解き': 'mystery',
    '料理・レシピ': 'other',
    '宇宙・SF': 'other',
    'お店・商店街': 'other',
    'スポーツ・試合': 'other',
  };

  function getTypeClass(frameName) {
    for (const [key, val] of Object.entries(frameTypeMap)) {
      if (frameName && frameName.includes(key.split('・')[0])) return val;
    }
    return 'other';
  }

  // フレームの候補プール
  const ALL_FRAMES = ['RPG・ゲーム','物語・冒険','魔法・儀式','探偵・謎解き','料理・レシピ','宇宙・SF','お店・商店街','スポーツ・試合'];

  function pickFrames() {
    if (selectedFrames.size >= 3) return [...selectedFrames].slice(0, 3);
    if (selectedFrames.size > 0) {
      const rest = ALL_FRAMES.filter(f => !selectedFrames.has(f));
      const shuffled = rest.sort(() => Math.random() - 0.5);
      return [...selectedFrames, ...shuffled].slice(0, 3);
    }
    return [...ALL_FRAMES].sort(() => Math.random() - 0.5).slice(0, 3);
  }

  async function generateOne(input, frame, index) {
    const system = `あなたはクリエイティブな発達支援デザイナーです。
入力された「普通の支援アイデア」を、子どもがワクワクして自然に取り組める「体験型アイデア」に昇華させます。

ルール：
- 支援の本質（なぜ効くか）は変えない
- 表面を指定フレームの世界観に変換する
- 子どもが主人公になる体験にする
- 「ツールを使わせる」ではなく「世界に没入させる」発想で

変換フレーム：${frame}

返答はJSONのみ（前置き・コードブロック不要）:
{
  "frame": "${frame}",
  "title": "体験型アイデアのタイトル（キャッチーに）",
  "scenario": "子どもが実際にどう体験するかの具体的シナリオ（3〜5文）",
  "why_it_works": "なぜこれが元のアイデアと同じ支援効果を持つか（1〜2文）"
}`;

    const response = await fetch("https://ginsprout-proxy.yumco-taka.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 600,
        system,
        messages: [{ role: "user", content: input }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  function appendCard(idea, index) {
    const cards = document.getElementById('cards');
    const results = document.getElementById('results');
    const typeClass = getTypeClass(idea.frame);

    const card = document.createElement('div');
    card.className = `idea-card type-${typeClass}`;
    card.innerHTML = `
      <span class="idea-frame-badge">${idea.frame}</span>
      <div class="idea-title">${idea.title}</div>
      <div class="idea-scenario">${idea.scenario}</div>
      <div class="idea-why">
        <strong>なぜ効くか</strong>
        ${idea.why_it_works}
      </div>
    `;
    cards.appendChild(card);
    results.classList.add('show');
  }

  async function twist() {
    const input = document.getElementById('input').value.trim();
    if (!input) return;

    const runBtn = document.getElementById('runBtn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const cards = document.getElementById('cards');

    runBtn.disabled = true;
    loading.classList.add('show');
    results.classList.remove('show');
    cards.innerHTML = '';

    const frames = pickFrames();
    let hasError = false;

    for (let i = 0; i < frames.length; i++) {
      // ローディングメッセージを更新
      const loadingP = loading.querySelector('p');
      if (loadingP) loadingP.textContent = `錬金中… (${i + 1} / ${frames.length})`;

      try {
        const idea = await generateOne(input, frames[i], i);
        appendCard(idea, i);
        // 1件目が出たらローディングを隠す
        if (i === 0) loading.classList.remove('show');
      } catch (err) {
        hasError = true;
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.style.marginBottom = '14px';
        errDiv.textContent = `⚠️ 「${frames[i]}」の生成中にエラーが発生しました。`;
        cards.appendChild(errDiv);
        results.classList.add('show');
      }
    }

    loading.classList.remove('show');
    runBtn.disabled = false;
  }
</script>
</body>
</html>

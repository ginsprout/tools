<style>
  :root{
    --bg:#F4F2EC;
    --surface:#FFFFFF;
    --ink:#2F3128;
    --ink-soft:#6B6D62;
    --line:#E1DECF;
    --silver:#9B9D92;
    --sprout:#5C7A4B;
    --sprout-deep:#46603A;
    --sprout-soft:#E3EADC;
    --plum:#8B5A6B;
    --plum-soft:#F2E7EA;
    --gold:#B98A2E;
    --gold-soft:#F4E9D2;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Zen Maru Gothic","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.6;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  header.app-header{padding:8px 4px 18px;}
  h1{
    font-family:"Shippori Mincho",serif;
    font-weight:700;
    font-size:1.6rem;
    margin:0 0 4px;
    letter-spacing:0.02em;
  }
  .subtitle{color:var(--ink-soft);font-size:0.88rem;margin:0;}

  nav.tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    flex:1;
    padding:11px 4px;
    border:none;
    background:none;
    font-family:inherit;
    font-size:0.92rem;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
  }
  nav.tabs button.active{color:var(--sprout-deep);border-bottom-color:var(--sprout);}
  nav.tabs button:focus-visible{outline:2px solid var(--sprout);outline-offset:2px;}

  section.tab-panel{display:none;}
  section.tab-panel.active{display:block;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    font-family:"Shippori Mincho",serif;
    font-size:1.05rem;
    margin:0 0 12px;
    color:var(--ink);
  }

  label.field{display:block;margin-bottom:12px;}
  label.field span.field-label{display:block;font-size:0.82rem;color:var(--ink-soft);margin-bottom:4px;}
  input[type=text], select, textarea{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:10px;
    font-family:inherit;
    font-size:0.95rem;
    background:#FAF9F5;
    color:var(--ink);
  }
  textarea{resize:vertical;min-height:64px;line-height:1.5;}
  input[type=text]:focus, select:focus, textarea:focus{outline:2px solid var(--sprout);outline-offset:1px;border-color:var(--sprout);}

  .checkline{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .checkline input[type=checkbox]{width:19px;height:19px;accent-color:var(--gold);}
  .checkline span{font-size:0.92rem;}

  .ingredient-row{display:flex;gap:8px;margin-bottom:8px;}
  .menu-memo{margin-top:6px;font-size:0.84rem;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word;}
  .menu-memo a{color:var(--sprout,#5C7A4B);text-decoration:underline;}
  .ingredient-row input.ing-name{flex:2;}
  .ingredient-row input.ing-amount{flex:1;}
  .ingredient-row button.remove-row{
    border:none;background:var(--plum-soft);color:var(--plum);
    border-radius:8px;width:38px;font-size:1.1rem;cursor:pointer;flex-shrink:0;
  }
  button.ghost-add{
    border:1px dashed var(--silver);
    background:none;color:var(--ink-soft);
    border-radius:9px;padding:7px 12px;font-size:0.85rem;
    cursor:pointer;margin-bottom:14px;font-family:inherit;
  }
  button.ghost-add:hover{border-color:var(--sprout);color:var(--sprout-deep);}

  .btn-row{display:flex;gap:10px;align-items:center;}
  button.primary{
    background:var(--sprout);color:#fff;border:none;
    padding:11px 20px;border-radius:10px;font-weight:700;
    font-size:0.95rem;cursor:pointer;font-family:inherit;
    min-height:44px;
  }
  button.primary:hover{background:var(--sprout-deep);}
  button.link-cancel{
    background:none;border:none;color:var(--ink-soft);
    font-size:0.85rem;text-decoration:underline;cursor:pointer;font-family:inherit;
  }

  /* menu cards */
  .menu-item{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 0;border-bottom:1px solid var(--line);gap:10px;
  }
  .menu-item:last-child{border-bottom:none;}
  .menu-name{font-weight:700;font-size:0.98rem;}
  .badge{
    display:inline-block;font-size:0.72rem;padding:2px 8px;border-radius:99px;
    margin-right:5px;margin-top:5px;
  }
  .badge.tag{background:var(--sprout-soft);color:var(--sprout-deep);}
  .badge.fav{background:var(--gold-soft);color:var(--gold);}
  .badge.usage{background:#EFEEE7;color:var(--ink-soft);}
  .menu-actions{display:flex;gap:6px;flex-shrink:0;}
  .menu-actions button{
    border:none;background:#EFEEE7;color:var(--ink-soft);
    border-radius:8px;padding:6px 10px;font-size:0.8rem;cursor:pointer;font-family:inherit;
  }
  .menu-actions button.del{background:var(--plum-soft);color:var(--plum);}
  .empty-state{color:var(--ink-soft);font-size:0.88rem;padding:18px 4px;text-align:center;}

  /* week view */
  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .week-nav button{
    border:1px solid var(--line);background:var(--surface);
    border-radius:9px;padding:8px 14px;font-family:inherit;cursor:pointer;font-size:0.85rem;
    color:var(--ink);min-height:40px;
  }
  .week-nav .range-label{font-weight:700;font-size:0.95rem;}
  .week-stats{font-size:0.8rem;color:var(--ink-soft);margin-bottom:12px;}

  .day-card{display:flex;margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  .day-tab{
    writing-mode:vertical-rl;
    background:var(--sprout);color:#fff;
    font-family:"Shippori Mincho",serif;
    padding:10px 7px;display:flex;align-items:center;justify-content:center;
    font-size:0.92rem;gap:6px;flex-shrink:0;
  }
  .day-card.empty .day-tab{background:var(--silver);}
  .day-tab .date-num{font-size:0.7rem;writing-mode:horizontal-tb;margin-top:4px;opacity:0.85;}
  .day-content{flex:1;background:var(--surface);padding:11px 13px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .day-content .placeholder{color:var(--silver);font-size:0.88rem;}
  .day-content .filled-name{font-weight:700;font-size:0.95rem;}
  .day-content .clear-day{
    border:none;background:none;color:var(--silver);font-size:1.1rem;cursor:pointer;flex-shrink:0;padding:4px 6px;
  }
  .day-content .clear-day:hover{color:var(--plum);}

  .chip-instructions{font-size:0.85rem;color:var(--ink-soft);margin:18px 0 10px;}
  .chip-list{display:flex;flex-wrap:wrap;gap:8px;}
  .menu-chip{
    border:1.5px solid var(--line);background:var(--surface);
    border-radius:99px;padding:8px 14px;font-size:0.85rem;cursor:pointer;
    font-family:inherit;color:var(--ink);transition:all .12s;
  }
  .menu-chip.fav::before{content:"★ ";color:var(--gold);}
  .menu-chip.armed{background:var(--sprout);color:#fff;border-color:var(--sprout);}
  .chip-empty-hint{color:var(--ink-soft);font-size:0.85rem;}

  /* shopping list */
  .import-row{margin-bottom:14px;}
  button.secondary{
    background:var(--sprout-soft);color:var(--sprout-deep);border:none;
    padding:10px 16px;border-radius:10px;font-weight:700;font-size:0.88rem;
    cursor:pointer;font-family:inherit;min-height:42px;
  }
  .add-item-row{display:flex;gap:8px;margin-bottom:16px;}
  .add-item-row input.item-name{flex:2;}
  .add-item-row input.item-amount{flex:1;}
  .add-item-row button{
    background:var(--sprout);color:#fff;border:none;border-radius:10px;
    padding:0 16px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .shop-item{
    display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);
  }
  .shop-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--sprout);flex-shrink:0;}
  .shop-item .item-text{flex:1;}
  .shop-item .item-amount-text{color:var(--ink-soft);font-size:0.85rem;margin-left:6px;}
  .shop-item.checked .item-text, .shop-item.checked .item-amount-text{
    text-decoration:line-through;color:var(--silver);
  }
  .shop-item .source-badge{
    font-size:0.7rem;background:#EFEEE7;color:var(--ink-soft);padding:2px 7px;border-radius:99px;margin-left:6px;
  }
  .shop-item .del-item{border:none;background:none;color:var(--silver);font-size:1.1rem;cursor:pointer;padding:4px;}
  .shop-item .del-item:hover{color:var(--plum);}
  .clear-checked-row{margin-top:14px;text-align:right;}
  button.plum-outline{
    border:1px solid var(--plum);color:var(--plum);background:none;
    border-radius:9px;padding:8px 14px;font-size:0.85rem;cursor:pointer;font-family:inherit;
  }
  button.plum-outline:disabled{opacity:0.4;cursor:default;}

  #hintToast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;
    font-size:0.85rem;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
    max-width:88%;text-align:center;z-index:50;
  }
  #hintToast.show{opacity:0.95;transform:translateX(-50%) translateY(0);}

  @media (max-width:480px){
    h1{font-size:1.4rem;}
    .day-tab{padding:8px 5px;font-size:0.82rem;}
    nav.tabs button{font-size:0.82rem;padding:10px 2px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="app-header">
    <h1>晩ごはんローテーション</h1>
    <p class="subtitle">メニューを登録して、週の予定を組み、買い物リストをつくる。</p>
  </header>

  <nav class="tabs">
    <button id="tabBtnMenu" onclick="showTab('menu')">メニュー管理</button>
    <button id="tabBtnWeek" onclick="showTab('week')">週間プラン</button>
    <button id="tabBtnShop" onclick="showTab('shop')">買い物リスト</button>
  </nav>

  <!-- ===== メニュー管理 ===== -->
  <section id="panelMenu" class="tab-panel">
    <div class="card">
      <h2 id="menuFormTitle">メニューを登録</h2>
      <div id="menuForm">
        <label class="field">
          <span class="field-label">メニュー名</span>
          <input type="text" id="menuNameInput" placeholder="例：肉じゃが">
        </label>
        <label class="field">
          <span class="field-label">タグ（任意）</span>
          <select id="menuTagInput">
            <option value="">タグなし</option>
            <option value="和食">和食</option>
            <option value="洋食">洋食</option>
            <option value="中華">中華</option>
            <option value="その他">その他</option>
          </select>
        </label>
        <div class="checkline">
          <input type="checkbox" id="menuFavInput">
          <span>★ 人気メニューにする</span>
        </div>

        <span class="field-label">材料（任意・入れなくてもOK）</span>
        <div id="ingredientRows"></div>
        <button type="button" class="ghost-add" onclick="addIngredientRow()">＋ 材料を追加</button>

        <label class="field" style="margin-top:14px;">
          <span class="field-label">メモ（レシピURLなど・任意）</span>
          <textarea id="menuMemoInput" placeholder="レシピのURLや作り方のメモなど自由に書けます"></textarea>
        </label>

        <div class="btn-row">
          <button type="button" class="primary" id="menuSubmitBtn" onclick="submitMenuForm()">追加する</button>
          <button type="button" class="link-cancel" id="menuCancelBtn" style="display:none;" onclick="cancelMenuEdit()">編集をやめる</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>登録済みメニュー</h2>
      <div id="menuListContainer"></div>
    </div>
  </section>

  <!-- ===== 週間プラン ===== -->
  <section id="panelWeek" class="tab-panel">
    <div class="card">
      <div class="week-nav">
        <button onclick="shiftWeek(-1)">← 前週</button>
        <span class="range-label" id="weekRangeLabel"></span>
        <button onclick="shiftWeek(1)">次週 →</button>
      </div>
      <div class="week-stats" id="weekStats"></div>
      <div id="dayCardsContainer"></div>

      <p class="chip-instructions">メニューをタップ → 置きたい曜日をタップで配置できます。</p>
      <div class="chip-list" id="weekChipList"></div>
    </div>
  </section>

  <!-- ===== 買い物リスト ===== -->
  <section id="panelShop" class="tab-panel">
    <div class="card">
      <h2>今週の献立から取り込む</h2>
      <p class="subtitle" style="margin-bottom:12px;">材料が登録されているメニューがあれば、まとめてリストに追加します。</p>
      <div class="import-row">
        <button class="secondary" onclick="importWeekIngredients()">今週の材料を取り込む</button>
      </div>
    </div>

    <div class="card">
      <h2>買い物リスト</h2>
      <div class="add-item-row">
        <input type="text" class="item-name" id="shopNameInput" placeholder="品名（例：にんじん）">
        <input type="text" class="item-amount" id="shopAmountInput" placeholder="数量・メモ">
        <button onclick="addShoppingItem()">追加</button>
      </div>
      <div id="shoppingListContainer"></div>
      <div class="clear-checked-row">
        <button class="plum-outline" id="clearCheckedBtn" onclick="clearCheckedItems()">チェック済みを削除</button>
      </div>
    </div>
  </section>

</div>

<div id="hintToast"></div>

<script>
/* ===================== ストレージ ===================== */
const STORAGE_KEYS = {
  menus: 'ginsprout_dinner_menus_v1',
  weeks: 'ginsprout_dinner_weeks_v1',
  shopping: 'ginsprout_dinner_shopping_v1',
};

function loadJSON(key, fallback){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){
    console.error('読み込み失敗', key, e);
    return fallback;
  }
}
function saveJSON(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
  }catch(e){
    console.error('保存失敗', key, e);
    showHint('保存に失敗しました。ストレージの空き容量をご確認ください。');
  }
}

/* ===================== 状態 ===================== */
let menus = loadJSON(STORAGE_KEYS.menus, []);
let weeks = loadJSON(STORAGE_KEYS.weeks, {});
let shoppingList = loadJSON(STORAGE_KEYS.shopping, []);
let editingMenuId = null;
let armedMenuId = null;
let currentWeekStart = getMonday(new Date());

const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
const DAY_LABELS = ['月','火','水','木','金','土','日'];

/* ===================== ユーティリティ ===================== */
function uid(){
  return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}
function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function toKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function currentWeekKey(){
  return toKey(currentWeekStart);
}
function formatRangeLabel(monday){
  const sunday = addDays(monday, 6);
  return `${monday.getMonth()+1}/${monday.getDate()}(月) 〜 ${sunday.getMonth()+1}/${sunday.getDate()}(日)`;
}
let hintTimer = null;
function showHint(msg){
  const el = document.getElementById('hintToast');
  el.textContent = msg;
  el.classList.add('show');
  if(hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(()=>{ el.classList.remove('show'); }, 2600);
}

/* ===================== タブ切り替え ===================== */
function showTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
  if(name === 'menu'){
    document.getElementById('panelMenu').classList.add('active');
    document.getElementById('tabBtnMenu').classList.add('active');
    renderMenuList();
  }else if(name === 'week'){
    document.getElementById('panelWeek').classList.add('active');
    document.getElementById('tabBtnWeek').classList.add('active');
    renderWeekView();
  }else{
    document.getElementById('panelShop').classList.add('active');
    document.getElementById('tabBtnShop').classList.add('active');
    renderShoppingList();
  }
}

/* ===================== メニュー管理 ===================== */
function addIngredientRow(name, amount){
  const container = document.getElementById('ingredientRows');
  const row = document.createElement('div');
  row.className = 'ingredient-row';
  row.innerHTML = `
    <input type="text" class="ing-name" placeholder="材料名" value="${escapeHtml(name||'')}">
    <input type="text" class="ing-amount" placeholder="数量（任意）" value="${escapeHtml(amount||'')}">
    <button type="button" class="remove-row" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(row);
}
function collectIngredientRows(){
  const rows = document.querySelectorAll('#ingredientRows .ingredient-row');
  const list = [];
  rows.forEach(r=>{
    const name = r.querySelector('.ing-name').value.trim();
    const amount = r.querySelector('.ing-amount').value.trim();
    if(name) list.push({name, amount});
  });
  return list;
}
function resetMenuForm(){
  document.getElementById('menuNameInput').value = '';
  document.getElementById('menuTagInput').value = '';
  document.getElementById('menuFavInput').checked = false;
  document.getElementById('menuMemoInput').value = '';
  document.getElementById('ingredientRows').innerHTML = '';
  addIngredientRow();
  editingMenuId = null;
  document.getElementById('menuSubmitBtn').textContent = '追加する';
  document.getElementById('menuCancelBtn').style.display = 'none';
  document.getElementById('menuFormTitle').textContent = 'メニューを登録';
}
function cancelMenuEdit(){
  resetMenuForm();
}
function editMenu(id){
  const m = menus.find(x=>x.id===id);
  if(!m) return;
  editingMenuId = id;
  document.getElementById('menuNameInput').value = m.name;
  document.getElementById('menuTagInput').value = m.tag || '';
  document.getElementById('menuFavInput').checked = !!m.favorite;
  document.getElementById('menuMemoInput').value = m.memo || '';
  const container = document.getElementById('ingredientRows');
  container.innerHTML = '';
  if(m.ingredients && m.ingredients.length){
    m.ingredients.forEach(ing=>addIngredientRow(ing.name, ing.amount));
  }else{
    addIngredientRow();
  }
  document.getElementById('menuSubmitBtn').textContent = '更新する';
  document.getElementById('menuCancelBtn').style.display = 'inline-block';
  document.getElementById('menuFormTitle').textContent = 'メニューを編集';
  showTab('menu');
  document.getElementById('menuForm').scrollIntoView({behavior:'smooth', block:'start'});
}
function deleteMenu(id){
  const m = menus.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`「${m.name}」を削除しますか？週間プランからも外れます。`)) return;
  menus = menus.filter(x=>x.id!==id);
  Object.keys(weeks).forEach(wk=>{
    DAY_KEYS.forEach(dk=>{
      if(weeks[wk][dk] === id) weeks[wk][dk] = null;
    });
  });
  saveJSON(STORAGE_KEYS.menus, menus);
  saveJSON(STORAGE_KEYS.weeks, weeks);
  if(editingMenuId === id) resetMenuForm();
  renderMenuList();
}
function getUsageCount(menuId){
  let count = 0;
  Object.values(weeks).forEach(w=>{
    DAY_KEYS.forEach(dk=>{ if(w[dk] === menuId) count++; });
  });
  return count;
}
function linkifyMemo(str){
  const escaped = escapeHtml(str);
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
}
function renderMenuList(){
  const container = document.getElementById('menuListContainer');
  if(menus.length === 0){
    container.innerHTML = `<p class="empty-state">まだメニューが登録されていません。上のフォームから追加してください。</p>`;
    return;
  }
  const sorted = [...menus].sort((a,b)=>{
    if(!!a.favorite !== !!b.favorite) return a.favorite ? -1 : 1;
    return a.name.localeCompare(b.name, 'ja');
  });
  container.innerHTML = sorted.map(m=>{
    const usage = getUsageCount(m.id);
    const ingCount = (m.ingredients && m.ingredients.length) ? m.ingredients.length : 0;
    let badges = '';
    if(m.favorite) badges += `<span class="badge fav">★ 人気</span>`;
    if(m.tag) badges += `<span class="badge tag">${escapeHtml(m.tag)}</span>`;
    if(ingCount) badges += `<span class="badge usage">材料${ingCount}点</span>`;
    if(usage) badges += `<span class="badge usage">使用${usage}回</span>`;
    const memoHtml = (m.memo && m.memo.trim()) ? `<div class="menu-memo">${linkifyMemo(m.memo.trim())}</div>` : '';
    return `
      <div class="menu-item">
        <div>
          <div class="menu-name">${escapeHtml(m.name)}</div>
          <div>${badges}</div>
          ${memoHtml}
        </div>
        <div class="menu-actions">
          <button onclick="editMenu('${m.id}')">編集</button>
          <button class="del" onclick="deleteMenu('${m.id}')">削除</button>
        </div>
      </div>
    `;
  }).join('');
}
function submitMenuForm(){
  const name = document.getElementById('menuNameInput').value.trim();
  if(!name){
    showHint('メニュー名を入力してください');
    document.getElementById('menuNameInput').focus();
    return;
  }
  const tag = document.getElementById('menuTagInput').value;
  const favorite = document.getElementById('menuFavInput').checked;
  const memo = document.getElementById('menuMemoInput').value.trim();
  const ingredients = collectIngredientRows();
  if(editingMenuId){
    const idx = menus.findIndex(m=>m.id===editingMenuId);
    if(idx > -1){
      menus[idx] = {...menus[idx], name, tag, favorite, memo, ingredients};
    }
  }else{
    menus.push({id: uid(), name, tag, favorite, memo, ingredients, createdAt: Date.now()});
  }
  saveJSON(STORAGE_KEYS.menus, menus);
  const wasEditing = !!editingMenuId;
  resetMenuForm();
  renderMenuList();
  showHint(wasEditing ? '更新しました' : '追加しました');
}
document.getElementById('menuNameInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    submitMenuForm();
  }
});

/* ===================== 週間プラン ===================== */
function getWeekDays(weekKey){
  return weeks[weekKey] || {mon:null,tue:null,wed:null,thu:null,fri:null,sat:null,sun:null};
}
function setWeekDay(weekKey, dayKey, menuId){
  if(!weeks[weekKey]) weeks[weekKey] = {mon:null,tue:null,wed:null,thu:null,fri:null,sat:null,sun:null};
  weeks[weekKey][dayKey] = menuId;
  saveJSON(STORAGE_KEYS.weeks, weeks);
}
function shiftWeek(n){
  currentWeekStart = addDays(currentWeekStart, n*7);
  armedMenuId = null;
  renderWeekView();
}
function placeOnDay(dayKey){
  if(armedMenuId){
    setWeekDay(currentWeekKey(), dayKey, armedMenuId);
    armedMenuId = null;
    renderWeekView();
  }else{
    showHint('まずメニューをタップして選んでください');
  }
}
function clearDay(dayKey){
  setWeekDay(currentWeekKey(), dayKey, null);
  renderWeekView();
}
function armMenu(id){
  armedMenuId = (armedMenuId === id) ? null : id;
  renderWeekChips();
}
function renderWeekChips(){
  const chipList = document.getElementById('weekChipList');
  if(menus.length === 0){
    chipList.innerHTML = `<span class="chip-empty-hint">「メニュー管理」タブでメニューを登録すると、ここに表示されます。</span>`;
    return;
  }
  const sorted = [...menus].sort((a,b)=>{
    if(!!a.favorite !== !!b.favorite) return a.favorite ? -1 : 1;
    return a.name.localeCompare(b.name, 'ja');
  });
  chipList.innerHTML = sorted.map(m=>{
    const cls = ['menu-chip'];
    if(m.favorite) cls.push('fav');
    if(armedMenuId === m.id) cls.push('armed');
    return `<button type="button" class="${cls.join(' ')}" onclick="armMenu('${m.id}')">${escapeHtml(m.name)}</button>`;
  }).join('');
}
function renderWeekView(){
  document.getElementById('weekRangeLabel').textContent = formatRangeLabel(currentWeekStart);
  const wd = getWeekDays(currentWeekKey());
  const container = document.getElementById('dayCardsContainer');
  container.innerHTML = DAY_KEYS.map((dk, i)=>{
    const dateObj = addDays(currentWeekStart, i);
    const dateNum = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
    const menuId = wd[dk];
    const menu = menuId ? menus.find(m=>m.id===menuId) : null;
    const emptyCls = menu ? '' : 'empty';
    const content = menu
      ? `<span class="filled-name">${escapeHtml(menu.name)}</span>
         <button class="clear-day" title="削除" onclick="clearDay('${dk}')">×</button>`
      : `<span class="placeholder">未定（メニューをタップして配置）</span>`;
    return `
      <div class="day-card ${emptyCls}" onclick="placeOnDay('${dk}')">
        <div class="day-tab">${DAY_LABELS[i]}<span class="date-num">${dateNum}</span></div>
        <div class="day-content">${content}</div>
      </div>
    `;
  }).join('');

  // 統計
  const usedIds = DAY_KEYS.map(dk=>wd[dk]).filter(Boolean);
  const distinct = new Set(usedIds).size;
  const undecided = 7 - usedIds.length;
  document.getElementById('weekStats').textContent =
    `今週：${distinct}種類のメニュー使用 / 未定${undecided}日`;

  renderWeekChips();
}

/* ===================== 買い物リスト ===================== */
function addShoppingItem(){
  const nameInput = document.getElementById('shopNameInput');
  const amountInput = document.getElementById('shopAmountInput');
  const name = nameInput.value.trim();
  if(!name){ showHint('品名を入力してください'); return; }
  const amount = amountInput.value.trim();
  shoppingList.push({id: uid(), name, amount, checked:false, source:'手入力'});
  saveJSON(STORAGE_KEYS.shopping, shoppingList);
  nameInput.value = '';
  amountInput.value = '';
  nameInput.focus();
  renderShoppingList();
}
function toggleChecked(id){
  const item = shoppingList.find(i=>i.id===id);
  if(item){
    item.checked = !item.checked;
    saveJSON(STORAGE_KEYS.shopping, shoppingList);
    renderShoppingList();
  }
}
function deleteShoppingItem(id){
  shoppingList = shoppingList.filter(i=>i.id!==id);
  saveJSON(STORAGE_KEYS.shopping, shoppingList);
  renderShoppingList();
}
function clearCheckedItems(){
  if(!shoppingList.some(i=>i.checked)) return;
  if(!confirm('チェック済みの項目を削除しますか？')) return;
  shoppingList = shoppingList.filter(i=>!i.checked);
  saveJSON(STORAGE_KEYS.shopping, shoppingList);
  renderShoppingList();
}
function importWeekIngredients(){
  const wd = getWeekDays(currentWeekKey());
  let addedCount = 0;
  DAY_KEYS.forEach(dk=>{
    const menuId = wd[dk];
    if(!menuId) return;
    const menu = menus.find(m=>m.id===menuId);
    if(!menu || !menu.ingredients || !menu.ingredients.length) return;
    menu.ingredients.forEach(ing=>{
      const dup = shoppingList.some(item=>
        item.name === ing.name && item.amount === (ing.amount||'') && item.source === menu.name
      );
      if(!dup){
        shoppingList.push({id: uid(), name: ing.name, amount: ing.amount||'', checked:false, source: menu.name});
        addedCount++;
      }
    });
  });
  saveJSON(STORAGE_KEYS.shopping, shoppingList);
  renderShoppingList();
  if(addedCount > 0){
    showHint(`${addedCount}件の材料を追加しました`);
  }else{
    showHint('追加できる材料がありませんでした（今週のメニューに材料未登録か、追加済みです）');
  }
}
function renderShoppingList(){
  const container = document.getElementById('shoppingListContainer');
  const clearBtn = document.getElementById('clearCheckedBtn');
  if(shoppingList.length === 0){
    container.innerHTML = `<p class="empty-state">買い物リストはまだ空です。上から取り込むか、追加してください。</p>`;
    clearBtn.disabled = true;
    return;
  }
  const unchecked = shoppingList.filter(i=>!i.checked);
  const checked = shoppingList.filter(i=>i.checked);
  const renderItem = item => `
    <div class="shop-item ${item.checked ? 'checked' : ''}">
      <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleChecked('${item.id}')">
      <span class="item-text">${escapeHtml(item.name)}${item.amount ? `<span class="item-amount-text">${escapeHtml(item.amount)}</span>` : ''}${(item.source && item.source !== '手入力') ? `<span class="source-badge">${escapeHtml(item.source)}</span>` : ''}</span>
      <button class="del-item" onclick="deleteShoppingItem('${item.id}')">×</button>
    </div>
  `;
  container.innerHTML = unchecked.map(renderItem).join('') + checked.map(renderItem).join('');
  clearBtn.disabled = checked.length === 0;
}

/* ===================== 初期化 ===================== */
addIngredientRow();
showTab(menus.length === 0 ? 'menu' : 'week');
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notionテキストクリーナー｜Ginsprout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --ink: #1a1714;
    --ink-light: #4a4540;
    --ink-faint: #8a837c;
    --paper: #f5f0ea;
    --paper-warm: #ede7de;
    --paper-deep: #d9d0c4;
    --accent: #8b3a2a;
    --accent-light: #b5604e;
    --gold: #a07840;
    --line: rgba(26,23,20,0.12);
    --shadow: rgba(26,23,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* 背景テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(26,23,20,0.025) 28px,
        rgba(26,23,20,0.025) 29px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--ink);
    flex: 1;
  }

  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 8px;
    border-radius: 2px;
    opacity: 0.7;
  }

  /* 設定パネル */
  .settings {
    background: var(--paper-warm);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px 32px;
    align-items: center;
  }

  .setting-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
  }

  .setting-item input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .setting-item input[type="number"] {
    width: 48px;
    background: var(--paper);
    border: 1px solid var(--paper-deep);
    border-radius: 2px;
    padding: 3px 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--ink);
    text-align: center;
  }

  .setting-note {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    width: 100%;
    padding-top: 4px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }

  /* テキストエリア */
  .areas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .areas { grid-template-columns: 1fr; }
  }

  .area-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .area-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .area-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
  }

  .char-count {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  textarea {
    width: 100%;
    height: 420px;
    background: white;
    border: 1px solid var(--paper-deep);
    border-radius: 4px;
    padding: 16px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 2;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  textarea:focus {
    outline: none;
    border-color: var(--ink-faint);
  }

  #output {
    background: var(--paper-warm);
    border-color: var(--paper-deep);
    cursor: text;
  }

  /* ボタン行 */
  .action-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-format {
    background: var(--accent);
    color: var(--paper);
    border: none;
    padding: 12px 32px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-format::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .btn-format:hover::after { background: rgba(255,255,255,0.1); }
  .btn-format:active { transform: scale(0.98); }

  .btn-copy {
    background: transparent;
    color: var(--ink-light);
    border: 1px solid var(--paper-deep);
    padding: 11px 24px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .btn-copy:hover {
    border-color: var(--ink-faint);
    color: var(--ink);
  }

  .btn-clear {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 11px 24px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-left: auto;
  }

  .btn-clear:hover {
    background: var(--accent);
    color: var(--paper);
  }

  /* 通知 */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 3px;
    font-size: 12px;
    letter-spacing: 0.1em;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ログ */
  .log {
    margin-top: 16px;
    background: var(--paper-warm);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 16px;
    font-size: 11px;
    line-height: 1.8;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    min-height: 48px;
    display: none;
  }

  .log.visible { display: block; }

  .log-item { color: var(--ink-light); }
  .log-item.warn { color: var(--accent-light); }
  .log-item.ok { color: var(--gold); }

  /* フッター */
  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="brand">Ginsprout</span>
    <h1>Notionテキストクリーナー</h1>
    <span class="badge">LOCAL</span>
  </header>
  <p style="font-size:12px;color:var(--ink-faint);letter-spacing:0.05em;margin-bottom:20px;">Notionのブロック構造で崩れた空行を修復し、不要なマークダウン記号を除去します</p>

  </div>

  <div class="settings">
    <label class="setting-item">
      <input type="checkbox" id="chk_remove_asterisk" checked>
      半角 <code>***</code> 等を除去
    </label>
    <label class="setting-item">
      <input type="checkbox" id="chk_remove_hr" checked>
      半角 <code>---</code> 等を除去
    </label>
    <label class="setting-item">
      <input type="checkbox" id="chk_invisible" checked>
      不可視文字を除去
    </label>
    <label class="setting-item">
      <input type="checkbox" id="chk_scene_break" checked>
      <code>$</code> / <code>$$</code> / <code>$$$</code> を空行に変換（1行・2行・3行）
    </label>

    <label class="setting-item">
      <input type="checkbox" id="chk_indent" checked>
      行頭の全角スペースを保持
    </label>
    <p class="setting-note">空行マーカー：<code>$</code> → 1行あけ　／　<code>$$</code> → 2行あけ　／　<code>$$$</code> → 3行あけ　／　全角 ＊ は保持されます</p>
  </div>

  <div class="areas">
    <div class="area-wrap">
      <div class="area-header">
        <span class="area-title">INPUT — Notionからコピペ</span>
        <span class="char-count" id="in_count">0文字</span>
      </div>
      <textarea id="input" placeholder="ここにNotionの本文を貼り付けてください。"></textarea>
    </div>
    <div class="area-wrap">
      <div class="area-header">
        <span class="area-title">OUTPUT — 整形済み</span>
        <span class="char-count" id="out_count">0文字</span>
      </div>
      <textarea id="output" readonly placeholder="整形後のテキストがここに出力されます。"></textarea>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-format" onclick="format()">整　形　する</button>
    <button class="btn-copy" onclick="copyOutput()">出力をコピー</button>
    <button class="btn-clear" onclick="clearAll()">リセット</button>
  </div>

  <div class="log" id="log"></div>

  <footer>
    <span>Notionテキストクリーナー</span>
    <span>ファイルはローカルで動作します。テキストは外部送信されません。</span>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>


document.getElementById('input').addEventListener('input', function() {
  const len = this.value.length;
  document.getElementById('in_count').textContent = len.toLocaleString() + '文字';
});

function format() {
  const raw = document.getElementById('input').value;
  if (!raw.trim()) {
    showToast('テキストを入力してください');
    return;
  }

  const opts = {
    removeAsterisk: document.getElementById('chk_remove_asterisk').checked,
    removeHr:       document.getElementById('chk_remove_hr').checked,
    removeInvisible: document.getElementById('chk_invisible').checked,
    preserveSceneBreak: document.getElementById('chk_scene_break').checked,
    sceneBreakLines: 3,
    preserveIndent: document.getElementById('chk_indent').checked,
  };

  const logs = [];
  let text = raw;

  // 1. 不可視文字除去
  if (opts.removeInvisible) {
    const before = text.length;
    text = text
      .replace(/\u200b/g, '')
      .replace(/\u200c/g, '')
      .replace(/\u200d/g, '')
      .replace(/\uFEFF/g, '')
      .replace(/\u00a0/g, ' ');
    const removed = before - text.length;
    if (removed > 0) logs.push({ type: 'warn', msg: `不可視文字を ${removed} 個除去しました` });
  }

  // 2. 行に分割
  let lines = text.split('\n');

  // 3. $$$/$$/$ 行をSCENE_TAGに変換（長い順に判定）
  const SCENE_TAG3 = '<<<SCENE3>>>';
  const SCENE_TAG2 = '<<<SCENE2>>>';
  const SCENE_TAG1 = '<<<SCENE1>>>';
  let sceneCount3 = 0, sceneCount2 = 0, sceneCount1 = 0;
  lines = lines.map(line => {
    const t = line.trim();
    if (t === '$$$') { sceneCount3++; return SCENE_TAG3; }
    if (t === '$$')  { sceneCount2++; return SCENE_TAG2; }
    if (t === '$')   { sceneCount1++; return SCENE_TAG1; }
    return line;
  });
  if (sceneCount3 > 0) logs.push({ type: 'ok', msg: `$$$ を ${sceneCount3} 箇所検出（3行あけ）` });
  if (sceneCount2 > 0) logs.push({ type: 'ok', msg: `$$ を ${sceneCount2} 箇所検出（2行あけ）` });
  if (sceneCount1 > 0) logs.push({ type: 'ok', msg: `$ を ${sceneCount1} 箇所検出（1行あけ）` });

  // 4. 半角記号行の除去（SCENE_TAGは保持）
  {
    const asteriskPattern = /^[\s\*\_\#\~\`\>\|\=\+\^\.\!\/\\]{1,20}$/; // ---を含まない
    const hrPattern      = /^[\s\-]{1,20}$/; // ---系のみ
    let removedCount = 0;
    lines = lines.map(line => {
      if (line === SCENE_TAG3 || line === SCENE_TAG2 || line === SCENE_TAG1) return line;
      const trimmed = line.trim();
      if (trimmed.length === 0) return line;
      if (/[^\x00-\x7F]/.test(trimmed)) return line; // 全角を含む行は保持
      if (opts.removeAsterisk && asteriskPattern.test(trimmed)) { removedCount++; return null; }
      if (opts.removeHr      && hrPattern.test(trimmed))       { removedCount++; return null; }
      return line;
    }).filter(l => l !== null);
    if (removedCount > 0) logs.push({ type: 'warn', msg: `半角記号行を ${removedCount} 行除去しました` });
  }

  // 5. 行末トリム・行頭スペース処理
  lines = lines.map(line => {
    if (line === SCENE_TAG3 || line === SCENE_TAG2 || line === SCENE_TAG1) return line;
    let l = line.trimEnd();
    if (!opts.preserveIndent) l = l.replace(/^[\s　]+/, '');
    return l;
  });

  // 6. 結合
  let joined = lines.join('\n');

  // 7. 各SCENE_TAG前後の余分な空行を除去して整理
  for (const tag of [SCENE_TAG3, SCENE_TAG2, SCENE_TAG1]) {
    const t = tag.replace(/[<>]/g, '\\$&');
    joined = joined.replace(new RegExp('\\n+' + t + '\\n+', 'g'), '\n' + tag + '\n');
    joined = joined.replace(new RegExp('\\n+' + t, 'g'),           '\n' + tag);
    joined = joined.replace(new RegExp(t + '\\n+', 'g'),           tag + '\n');
  }

  // 8. 通常の余分な空行を正規化
  joined = joined.replace(/\n{3,}/g, (m, offset, str) => {
    const before = str.slice(Math.max(0, offset - 20), offset);
    const after  = str.slice(offset + m.length, offset + m.length + 20);
    if (before.includes('<<<SCENE') || after.includes('<<<SCENE')) return m;
    return '\n\n';
  });

  // 9. 最後にSCENE_TAGを空行に展開
  joined = joined.replace(/\n?<<<SCENE3>>>\n?/g, '\n'.repeat(4)); // 3行あけ
  joined = joined.replace(/\n?<<<SCENE2>>>\n?/g, '\n'.repeat(3)); // 2行あけ
  joined = joined.replace(/\n?<<<SCENE1>>>\n?/g, '\n'.repeat(2)); // 1行あけ

  // 10. 前後トリム
  const result = joined.trim();

  document.getElementById('output').value = result;
  document.getElementById('out_count').textContent = result.length.toLocaleString() + '文字';

  const logEl = document.getElementById('log');
  if (logs.length > 0) {
    logEl.innerHTML = logs.map(l => `<div class="log-item ${l.type}">▸ ${l.msg}</div>`).join('');
  } else {
    logEl.innerHTML = '<div class="log-item ok">▸ 整形が完了しました（特記事項なし）</div>';
  }
  logEl.classList.add('visible');

  showToast('整形完了');
}

function copyOutput() {
  const text = document.getElementById('output').value;
  if (!text) {
    showToast('出力テキストがありません');
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    showToast('コピーしました');
  }).catch(() => {
    // fallback
    document.getElementById('output').select();
    document.execCommand('copy');
    showToast('コピーしました');
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('in_count').textContent = '0文字';
  document.getElementById('out_count').textContent = '0文字';
  document.getElementById('log').classList.remove('visible');
  showToast('クリアしました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>

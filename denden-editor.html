<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>でんでん記法エディター</title>

<!-- ── Favicon（画像ファイルを使わない、HTML埋め込み型） ── -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='31' fill='%23f7f3ea' stroke='%23d8cfb9' stroke-width='1.5'/%3E%3Crect x='17' y='13' width='4' height='38' rx='2' fill='%232c3e54'/%3E%3Crect x='29' y='13' width='4' height='38' rx='2' fill='%232c3e54'/%3E%3Crect x='41' y='13' width='4' height='29' rx='2' fill='%232c3e54'/%3E%3Ccircle cx='43' cy='49' r='3.2' fill='%23b5462f'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f7f3ea'/%3E%3Crect x='17' y='13' width='4' height='38' rx='2' fill='%232c3e54'/%3E%3Crect x='29' y='13' width='4' height='38' rx='2' fill='%232c3e54'/%3E%3Crect x='41' y='13' width='4' height='29' rx='2' fill='%232c3e54'/%3E%3Ccircle cx='43' cy='49' r='3.2' fill='%23b5462f'/%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-title" content="でんでん記法">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c3e54">
<style>
  :root{
    --paper: #f7f3ea;
    --ink: #2b2a28;
    --ink-soft: #5c5850;
    --indigo: #2c3e54;
    --indigo-deep: #1c2a3a;
    --vermillion: #b5462f;
    --vermillion-soft: #d9a896;
    --line: #d8cfb9;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    background: var(--paper);
    color: var(--ink);
  }
  .wrap{
    max-width: 920px;
    margin: 0 auto;
    padding: 16px 14px 50px;
  }
  header{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 6px;
  }
  h1{
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin: 0;
    color: var(--indigo-deep);
  }
  .count{
    font-size: 12px;
    color: var(--ink-soft);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  }

  /* タブ */
  .tabs{
    display:flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 10px 6px;
    font-size: 13px;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    border: 1px solid var(--indigo);
    background: #fff;
    color: var(--indigo-deep);
    border-radius: 4px;
    cursor: pointer;
  }
  .tab.active{
    background: var(--indigo);
    color: #fff;
  }

  .panel{ display:none; }
  .panel.active{ display:block; }

  /* ツールバー */
  .toolbar{
    display:flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  button{
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    border: 1px solid var(--indigo);
    background: #fff;
    color: var(--indigo-deep);
    padding: 10px 12px;
    font-size: 13px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.01em;
    -webkit-user-select:none;
    user-select:none;
  }
  button:active{ transform: translateY(1px); }
  button.add-btn{
    border-style: dashed;
    color: var(--ink-soft);
    border-color: var(--ink-soft);
  }
  button.danger{
    border-color: var(--vermillion);
    color: var(--vermillion);
  }
  .custom-btn-group{
    display:inline-flex;
    align-items: center;
    border: 1px solid var(--vermillion-soft);
    border-radius: 3px;
    overflow: hidden;
  }
  .custom-btn-group button{ border:none; border-radius:0; }
  .custom-btn-group .remove{
    padding: 10px 9px;
    color: var(--vermillion);
    font-size: 12px;
    border-left: 1px solid var(--vermillion-soft);
  }

  textarea{
    width: 100%;
    min-height: 50vh;
    padding: 16px;
    font-size: 16px;
    line-height: 1.9;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    color: var(--ink);
    background: #fffdf8;
    border: 1px solid var(--line);
    border-radius: 4px;
    resize: vertical;
  }
  textarea:focus{ outline:none; border-color: var(--indigo); }

  .footer-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hint{
    font-size: 11px;
    color: var(--ink-soft);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  .actions{ display:flex; gap: 6px; flex-wrap:wrap; }

  /* 縦書き／横書き切り替え */
  .preview-toggle{
    display:flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .ptoggle{
    padding: 7px 14px;
    font-size: 12px;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    border-radius: 3px;
    cursor: pointer;
  }
  .ptoggle.active{
    border-color: var(--indigo);
    color: var(--indigo-deep);
    background: #eef1f4;
  }

  /* 縦書きプレビュー */
  .preview-box{
    border: 1px solid var(--line);
    background: #fffdf8;
    border-radius: 4px;
    height: 60vh;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .preview-inner{
    writing-mode: vertical-rl;
    -webkit-writing-mode: vertical-rl;
    text-orientation: mixed;
    height: 100%;
    padding: 22px 18px;
    font-size: 16px;
    line-height: 2.1;
  }
  .preview-inner.horizontal{
    writing-mode: horizontal-tb;
    -webkit-writing-mode: horizontal-tb;
    height: auto;
    min-height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .preview-inner p{ margin: 0 0 1.4em 0; }
  .preview-inner .part-title{
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    height: 100%;
    gap: 0.6em;
  }
  .preview-inner .part-title p{ margin: 0; }
  .preview-inner p.center-text{
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .preview-inner h1,.preview-inner h2,.preview-inner h3,
  .preview-inner h4,.preview-inner h5,.preview-inner h6{
    margin: 0 0 1em 0;
    font-weight: 600;
  }
  .preview-inner h1.part-title,.preview-inner h2.part-title,.preview-inner h3.part-title,
  .preview-inner h4.part-title,.preview-inner h5.part-title,.preview-inner h6.part-title{
    margin: 0;
  }
  .preview-inner ruby rt{ font-size: 0.5em; }
  .preview-inner em.bouten{
    font-style: normal;
    -webkit-text-emphasis-style: dot;
    text-emphasis-style: dot;
    text-emphasis-position: outside;
  }
  /* 横書きでは*強調*はイタリック体になる（公式仕様どおり、圏点は縦書き限定） */
  .preview-inner.horizontal em.bouten{
    font-style: italic;
    -webkit-text-emphasis-style: none;
    text-emphasis-style: none;
  }
  .preview-inner .tcy{
    -webkit-text-combine: horizontal;
    text-combine-upright: all;
  }
  .preview-inner .page-divider{
    writing-mode: horizontal-tb;
    font-size: 10px;
    color: var(--ink-soft);
    text-align:center;
    margin: 0 0 1.4em 0;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  .preview-inner .blank-line{ width: 1.4em; }
  .preview-inner.horizontal .blank-line{ width: auto; height: 1.4em; }
  .preview-inner .link{
    color: var(--vermillion);
    text-decoration: underline;
  }
  .preview-inner .img-placeholder{
    display: inline-block;
    writing-mode: horizontal-tb;
    border: 1px dashed var(--ink-soft);
    border-radius: 3px;
    padding: 1px 8px;
    margin: 0 2px;
    font-size: 0.75em;
    color: var(--ink-soft);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    vertical-align: middle;
  }
  .preview-empty{
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--ink-soft);
    font-size: 13px;
    writing-mode: horizontal-tb;
    padding: 20px;
  }
  .preview-note{
    font-size: 11px;
    color: var(--ink-soft);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    margin: 8px 0 0;
  }

  .toast{
    position: fixed;
    bottom: 18px; left: 50%;
    transform: translate(-50%, 8px);
    background: var(--indigo-deep);
    color: #fff;
    padding: 9px 18px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 60;
  }
  .toast.show{ opacity: 1; transform: translate(-50%, 0); }

  .modal-backdrop{
    position: fixed; inset:0;
    background: rgba(20,20,18,0.4);
    display:none;
    align-items:center; justify-content:center;
    z-index: 50; padding: 16px;
  }
  .modal-backdrop.show{ display:flex; }
  .modal{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    width: 100%;
    max-width: 320px;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  .modal h2{ font-size: 14px; margin: 0 0 12px; color: var(--indigo-deep); }
  .modal label{ display:block; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .modal input{
    width:100%; padding: 8px 9px; font-size: 13px;
    border: 1px solid var(--line); border-radius: 3px;
    margin-bottom: 12px; font-family: inherit;
  }
  .modal-actions{ display:flex; justify-content:flex-end; gap: 8px; }

  @media (max-width: 480px){
    button{ font-size: 12px; padding: 10px 9px; }
    h1{ font-size: 15px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>でんでん記法エディター</h1>
    <span class="count" id="charCount">0文字</span>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="edit">編集</div>
    <div class="tab" data-tab="preview">プレビュー</div>
  </div>

  <div class="panel active" id="panelEdit">
    <div class="toolbar" id="toolbar">
      <button data-action="pagebreak">改ページ</button>
      <button data-action="blankline">1行あけ</button>
      <button data-action="ruby">ルビ</button>
      <button data-action="bouten">傍点</button>
      <button data-action="heading" data-level="1">見出し1</button>
      <button data-action="heading" data-level="2">見出し2</button>
      <button data-action="heading" data-level="3">見出し3</button>
      <button data-action="tcy">縦中横</button>
      <button data-action="link">リンク</button>
      <button data-action="image">画像</button>
      <button data-action="divider">章扉</button>
      <button data-action="centertext">センター寄せ</button>
      <button class="add-btn" id="addBtn">＋ボタン追加</button>
    </div>

    <textarea id="editor" placeholder="ここに本文を書く、または貼り付けてください。"></textarea>

    <div class="footer-row">
      <span class="hint">ルビ・傍点・縦中横は文字を選択してからボタンを押すと囲みます。</span>
      <div class="actions">
        <button id="copyBtn">全文コピー</button>
        <button id="downloadBtn">共有</button>
        <button id="copyCssBtn">CSSをコピー</button>
        <button id="downloadCssBtn">CSSを共有</button>
        <button id="batchTcyBtn">！？を一括変換</button>
        <button class="danger" id="clearBtn">クリア</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panelPreview">
    <div class="preview-toggle">
      <div class="ptoggle active" data-mode="vertical">縦書き</div>
      <div class="ptoggle" data-mode="horizontal">横書き</div>
    </div>
    <div class="preview-box">
      <div class="preview-inner" id="previewInner">
        <div class="preview-empty">編集タブで本文を入力すると、ここに表示されます。</div>
      </div>
    </div>
    <p class="preview-note">※これは構成確認用の簡易プレビューです。実際のEPUB／Kindleでの見た目は、必ずKindle Previewer等で最終確認してください。</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>カスタムボタンを追加</h2>
    <label>ボタンの表示名</label>
    <input type="text" id="modalLabel" placeholder="例: 章タイトル">
    <label>挿入する記法（カーソル位置に挿入）</label>
    <input type="text" id="modalSnippet" placeholder="例: ## 見出し ##">
    <div class="modal-actions">
      <button id="modalCancel">キャンセル</button>
      <button id="modalSave">追加する</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="clearModalBackdrop">
  <div class="modal">
    <h2>本文をすべて消去します</h2>
    <p style="font-size:13px; color:var(--ink-soft); margin: 0 0 16px;">この操作は元に戻せません。よろしいですか？</p>
    <div class="modal-actions">
      <button id="clearCancel">キャンセル</button>
      <button class="danger" id="clearConfirm">消去する</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="handoffModalBackdrop">
  <div class="modal">
    <h2>変換ツールからの原稿があります</h2>
    <p style="font-size:13px; color:var(--ink-soft); margin: 0 0 16px;">読み込むと、現在編集中の内容は上書きされます。よろしいですか？</p>
    <div class="modal-actions">
      <button id="handoffSkip">今は使わない</button>
      <button id="handoffLoad">読み込む</button>
    </div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const toolbar = document.getElementById('toolbar');
const charCount = document.getElementById('charCount');
const toast = document.getElementById('toast');
const previewInner = document.getElementById('previewInner');

const CONTENT_KEY = 'content';
const BUTTONS_KEY = 'custom-buttons';
const HANDOFF_KEY = 'denden-handoff'; // 変換ツールから渡された原稿の受け取り用

/* でんでんコンバーター用 default_vertical.css（.middle/.title の中央寄せ追加済み） */

let saveTimer = null;
let previewTimer = null;

/* Claudeのアーティファクト内ではwindow.storageを、実際にデプロイした
   GitHub Pages等ではlocalStorageを使う、両対応のストレージ。 */
const storage = {
  async get(key){
    if(window.storage){
      try{ return await window.storage.get(key, false); }catch(e){}
    }
    try{
      const v = localStorage.getItem('denden-editor:' + key);
      return v !== null ? { value: v } : null;
    }catch(e){ return null; }
  },
  async set(key, value){
    if(window.storage){
      try{ return await window.storage.set(key, value, false); }catch(e){}
    }
    try{ localStorage.setItem('denden-editor:' + key, value); return { key, value }; }catch(e){ return null; }
  }
};

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 1700);
}

function updateCount(){
  charCount.textContent = editor.value.length + '文字';
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await storage.set(CONTENT_KEY, editor.value); }catch(e){}
  }, 700);
}

function schedulePreview(){
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 250);
}

editor.addEventListener('input', ()=>{
  updateCount();
  scheduleSave();
  schedulePreview();
});

/* ===== でんでん記法 → プレビューHTML（簡易パーサー） ===== */
function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inlineParse(str){
  let s = escapeHtml(str);
  // 画像 ![代替テキスト](パス)
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g, (m, alt)=>{
    const label = alt && alt.trim() ? alt : '(画像)';
    return '<span class="img-placeholder">🖼 ' + label + '</span>';
  });
  // ハイパーリンク [テキスト](URL "タイトル")
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g, (m, text, url, title)=>{
    const t = title ? ' title="'+title+'"' : '';
    return '<a class="link" href="'+url+'"'+t+'>'+text+'</a>';
  });
  // ルビ {親文字|るび|るび...}
  s = s.replace(/\{([^{}|]+)((?:\|[^{}|]*)+)\}/g, (m, base, rubyPart)=>{
    const rubies = rubyPart.split('|').slice(1);
    const baseChars = Array.from(base);
    if(rubies.length > 1 && rubies.length === baseChars.length){
      return '<ruby>' + baseChars.map((c,i)=>c+'<rt>'+rubies[i]+'</rt>').join('') + '</ruby>';
    }
    return '<ruby>' + base + '<rt>' + rubies.join('') + '</rt></ruby>';
  });
  // 縦中横 ^text^
  s = s.replace(/\^([^^]+)\^/g, '<span class="tcy">$1</span>');
  // 重要 **text**
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 強調（縦書きでは傍点） *text*
  s = s.replace(/\*([^*]+)\*/g, '<em class="bouten">$1</em>');
  return s;
}

function pageDividerHtml(n){
  return '<div class="page-divider">――― 改ページ '+n+' ―――</div>';
}
const EMPTY_HTML = '<div class="preview-empty">編集タブで本文を入力すると、ここに縦書きで表示されます。</div>';

function parseDenden(text){
  if(!text.trim()) return EMPTY_HTML;

  // 扉ページのブロックは、内部に空行が入っていても崩れないように、
  // ブロック分割の前に丸ごと検出してプレースホルダーに置き換える。
  const partTitles = []; // { level, content }

  // 内側を<span>で1つにまとめている場合、表示用にそのラッパーだけ取り除く
  function stripSpanWrapper(inner){
    const m = inner.trim().match(/^<span[^>]*>([\s\S]*)<\/span>$/i);
    return m ? m[1] : inner;
  }

  // 新方式：<div class="middle">の中の見出し(h1〜h6.title)＝章扉
  let normalizedText = text.replace(
    /<div[^>]*class="middle"[^>]*>\s*<h([1-6])[^>]*class="title"[^>]*>([\s\S]*?)<\/h\1>\s*<\/div>/gi,
    (m, level, inner)=>{
      const content = inner.replace(/<br\s*\/?>/gi, '\n').replace(/\n+/g, '\n').trim();
      partTitles.push({ level: parseInt(level, 10), content });
      return '\n\n\u0001PARTTITLE' + (partTitles.length - 1) + '\u0001\n\n';
    }
  );

  // 新方式：<div class="middle">の中の<div class="title">＝改ページなしセンター寄せ
  const centerTexts = [];
  normalizedText = normalizedText.replace(
    /<div[^>]*class="middle"[^>]*>\s*<div[^>]*class="title"[^>]*>([\s\S]*?)<\/div>\s*<\/div>/gi,
    (m, inner)=>{
      centerTexts.push(inner.replace(/<br\s*\/?>/gi, '\n').replace(/\n+/g, '\n').trim());
      return '\n\n\u0001CENTERTEXT' + (centerTexts.length - 1) + '\u0001\n\n';
    }
  );

  // 旧方式（互換用）：見出しタグ（h1〜h6）に直接スタイルを当てたもの（章扉）
  normalizedText = normalizedText.replace(
    /<h([1-6])[^>]*class="denden-center-page"[^>]*>([\s\S]*?)<\/h\1>/gi,
    (m, level, inner)=>{
      const content = stripSpanWrapper(inner).replace(/\n+/g, '').trim();
      partTitles.push({ level: parseInt(level, 10), content });
      return '\n\n\u0001PARTTITLE' + (partTitles.length - 1) + '\u0001\n\n';
    }
  );

  // 旧方式（互換用）：改ページなしの単独センター寄せ段落
  normalizedText = normalizedText.replace(
    /<p[^>]*class="denden-center-text"[^>]*>([\s\S]*?)<\/p>/gi,
    (m, inner)=>{
      centerTexts.push(stripSpanWrapper(inner).replace(/\n+/g, '').trim());
      return '\n\n\u0001CENTERTEXT' + (centerTexts.length - 1) + '\u0001\n\n';
    }
  );

  // 旧方式：div + p で組んでいたもの（過去に挿入済みの原稿との互換用）
  normalizedText = normalizedText.replace(
    /<div[^>]*class="denden-center-page"[^>]*>([\s\S]*?)<\/div>/gi,
    (m, inner)=>{
      const pMatches = [...inner.matchAll(/<p[^>]*>([\s\S]*?)<\/p>/gi)];
      const content = pMatches.length > 0
        ? pMatches.map(pm => pm[1].replace(/\n+/g, '').trim()).join('\n')
        : inner.replace(/\n+/g, '').trim();
      partTitles.push({ level: 0, content });
      return '\n\n\u0001PARTTITLE' + (partTitles.length - 1) + '\u0001\n\n';
    }
  );

  const blocks = normalizedText.split(/\n[ \t]*\n+/);
  let html = '';
  let pageNum = 1;

  blocks.forEach(block=>{
    const trimmed = block.trim();
    if(trimmed === '') return;

    // 単独センター寄せ（改ページなし）のプレースホルダー
    const centerTextMatch = trimmed.match(/^\u0001CENTERTEXT(\d+)\u0001$/);
    if(centerTextMatch){
      const content = centerTexts[parseInt(centerTextMatch[1], 10)];
      html += '<p class="center-text">' + inlineParse(content) + '</p>';
      return;
    }

    // 扉ページ（横方向中央寄せ）のプレースホルダー
    const partTitleMatch = trimmed.match(/^\u0001PARTTITLE(\d+)\u0001$/);
    if(partTitleMatch){
      const { level, content } = partTitles[parseInt(partTitleMatch[1], 10)];
      // 複数行（旧方式で複数pタグだった場合）は別々の段落として中央寄せの中に並べる
      const innerHtml = content.split('\n').map(line => '<p>' + inlineParse(line) + '</p>').join('');
      if(level >= 1){
        html += '<h' + level + ' class="part-title">' + innerHtml + '</h' + level + '>';
      } else {
        html += '<div class="part-title">' + innerHtml + '</div>';
      }
      return;
    }

    // ブロック全体が改ページ行だけのとき（空行で正しく囲まれているケース）
    if(/^={3,}$/.test(trimmed)){
      pageNum++;
      html += pageDividerHtml(pageNum);
      return;
    }
    // ブロック全体が1行あけ指定のとき
    if(/^<p>\s*<br\s*\/?>\s*<\/p>$/i.test(trimmed)){
      html += '<div class="blank-line"></div>';
      return;
    }

    // 見出し。意図しない改行が紛れ込んでいても、ブロックの最初の行が
    // #で始まっていれば、ブロック全体を1つの見出しとしてまとめて扱う。
    if(/^#{1,6}(\s|$)/.test(trimmed)){
      const headingMatch = trimmed.match(/^(#{1,6})\s*([\s\S]*?)\s*#*$/);
      if(headingMatch){
        const level = headingMatch[1].length;
        const content = headingMatch[2].replace(/\n+/g, ''); // 見出し内の改行は結合する
        html += '<h'+level+'>'+inlineParse(content)+'</h'+level+'>';
        return;
      }
    }

    // 通常の段落。改ページ行や1行あけ指定が、空行を挟まずに本文中へ
    // 直接混在しているケースにも対応するため、行単位でも改ページ等を検出する。
    const lines = block.split('\n');
    let buffer = [];
    const flushParagraph = ()=>{
      if(buffer.length){
        html += '<p>'+buffer.map(inlineParse).join('<br>')+'</p>';
        buffer = [];
      }
    };
    lines.forEach(line=>{
      const lineTrim = line.trim();
      if(/^={3,}$/.test(lineTrim)){
        flushParagraph();
        pageNum++;
        html += pageDividerHtml(pageNum);
      } else if(/^<p>\s*<br\s*\/?>\s*<\/p>$/i.test(lineTrim)){
        flushParagraph();
        html += '<div class="blank-line"></div>';
      } else if(/^#{1,6}\s*.+/.test(lineTrim)){
        flushParagraph();
        const m = lineTrim.match(/^(#{1,6})\s*(.+?)\s*#*$/);
        const level = m[1].length;
        html += '<h'+level+'>'+inlineParse(m[2])+'</h'+level+'>';
      } else {
        buffer.push(line);
      }
    });
    flushParagraph();
  });
  return html || EMPTY_HTML;
}

function renderPreview(){
  previewInner.innerHTML = parseDenden(editor.value);
}

/* ===== 挿入ロジック =====
   editor.value を直接書き換えると、ブラウザの「元に戻す(⌘Z)」履歴が
   壊れてしまうため、ネイティブの undo 履行を保ったまま挿入できる
   document.execCommand('insertText', ...) を使う。
   （非推奨APIだが、textareaへのテキスト挿入用途では現在も広く動作する） */
function replaceRange(start, end, text){
  editor.focus();
  editor.setSelectionRange(start, end);
  const ok = document.execCommand('insertText', false, text);
  if(!ok){
    // 使えない環境向けのフォールバック（この場合のみ元に戻す履行が壊れる）
    const value = editor.value;
    editor.value = value.slice(0, start) + text + value.slice(end);
  }
}

function insertBlock(line){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;

  const beforeText = value.slice(0, start);
  let prefix = '';
  if(beforeText.length === 0){
    prefix = '';
  } else if(beforeText.endsWith('\n\n')){
    prefix = '';
  } else if(beforeText.endsWith('\n')){
    prefix = '\n';
  } else {
    prefix = '\n\n';
  }

  const afterText = value.slice(end);
  let suffix = '';
  if(afterText.length === 0){
    suffix = '';
  } else if(afterText.startsWith('\n\n')){
    suffix = '';
  } else if(afterText.startsWith('\n')){
    suffix = '\n';
  } else {
    suffix = '\n\n';
  }

  const insertText = prefix + line + suffix;
  replaceRange(start, end, insertText);
  const cursorPos = start + prefix.length + line.length + (suffix ? suffix.length : 0);
  editor.setSelectionRange(cursorPos, cursorPos);
  updateCount(); scheduleSave(); schedulePreview();
}

function wrapSelection(before, after, placeholder){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end);

  if(selected.length > 0){
    const insertText = before + selected + after;
    replaceRange(start, end, insertText);
    const cursorPos = start + insertText.length;
    editor.setSelectionRange(cursorPos, cursorPos);
  } else {
    const insertText = before + placeholder + after;
    replaceRange(start, end, insertText);
    const selStart = start + before.length;
    const selEnd = selStart + placeholder.length;
    editor.setSelectionRange(selStart, selEnd);
  }
  updateCount(); scheduleSave(); schedulePreview();
}

function insertRuby(){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end);

  if(selected.length > 0){
    const insertText = '{' + selected + '|' + '}';
    replaceRange(start, end, insertText);
    const cursorPos = start + 1 + selected.length + 1; // | と } の間
    editor.setSelectionRange(cursorPos, cursorPos);
  } else {
    const template = '{親文字|るび}';
    replaceRange(start, end, template);
    // 「親文字」部分を選択状態にする
    const selStart = start + 1;
    const selEnd = selStart + 3;
    editor.setSelectionRange(selStart, selEnd);
  }
  updateCount(); scheduleSave(); schedulePreview();
}

function insertHeadingBlock(level){
  const lv = Math.min(Math.max(parseInt(level, 10) || 2, 1), 6);
  const hashes = '#'.repeat(lv);
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end) || '見出し';
  const line = hashes + ' ' + selected;

  const beforeText = value.slice(0, start);
  let prefix = '';
  if(beforeText.length === 0){ prefix = ''; }
  else if(beforeText.endsWith('\n\n')){ prefix = ''; }
  else if(beforeText.endsWith('\n')){ prefix = '\n'; }
  else { prefix = '\n\n'; }

  const afterText = value.slice(end);
  let suffix = '';
  if(afterText.length === 0){ suffix = ''; }
  else if(afterText.startsWith('\n\n')){ suffix = ''; }
  else if(afterText.startsWith('\n')){ suffix = '\n'; }
  else { suffix = '\n\n'; }

  const insertText = prefix + line + suffix;
  replaceRange(start, end, insertText);

  const textStart = start + prefix.length + hashes.length + 1; // 'hashes ' の後ろ
  const textEnd = textStart + selected.length;
  editor.setSelectionRange(textStart, textEnd);
  updateCount(); scheduleSave(); schedulePreview();
}

function insertLink(){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end);
  const text = selected || 'リンクテキスト';
  const before = '[' + text + '](';
  const urlPlaceholder = 'URL';
  const after = ')';
  replaceRange(start, end, before + urlPlaceholder + after);
  const selStart = start + before.length;
  const selEnd = selStart + urlPlaceholder.length;
  editor.setSelectionRange(selStart, selEnd);
  updateCount(); scheduleSave(); schedulePreview();
}

function insertImage(){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end);
  const alt = selected || '代替テキスト';
  const before = '![' + alt + '](';
  const pathPlaceholder = 'img.jpg';
  const after = ')';
  replaceRange(start, end, before + pathPlaceholder + after);
  const selStart = start + before.length;
  const selEnd = selStart + pathPlaceholder.length;
  editor.setSelectionRange(selStart, selEnd);
  updateCount(); scheduleSave(); schedulePreview();
}

function insertDividerPage(){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end) || '扉ページのタイトル';

  const beforeText = value.slice(0, start);
  let prefix = '';
  if(beforeText.length === 0){ prefix = ''; }
  else if(beforeText.endsWith('\n\n')){ prefix = ''; }
  else if(beforeText.endsWith('\n')){ prefix = '\n'; }
  else { prefix = '\n\n'; }

  const afterText = value.slice(end);
  let suffix = '';
  if(afterText.length === 0){ suffix = ''; }
  else if(afterText.startsWith('\n\n')){ suffix = ''; }
  else if(afterText.startsWith('\n')){ suffix = '\n'; }
  else { suffix = '\n\n'; }

  // 新方式：いったん横書きに戻した<div class="middle">の中で
  // text-align:centerにより中央寄せし、見出し(h2.title)だけを
  // 縦書きに戻す。markdown="1"やspanは使わない（タグの入れ子崩れの原因になるため）。
  const openTag = '<div class="middle">\n<h2 class="title">';
  const closeTag = '</h2>\n</div>';
  const block = '==============\n\n' + openTag + selected + closeTag + '\n\n==============';
  const insertText = prefix + block + suffix;
  replaceRange(start, end, insertText);

  const titleStart = start + prefix.length + '=============='.length + '\n\n'.length + openTag.length;
  const titleEnd = titleStart + selected.length;
  editor.setSelectionRange(titleStart, titleEnd);
  updateCount(); scheduleSave(); schedulePreview();
}

function insertCenterText(){
  const start = editor.selectionStart, end = editor.selectionEnd;
  const value = editor.value;
  const selected = value.slice(start, end) || 'ここにセンター寄せしたい文章';

  const beforeText = value.slice(0, start);
  let prefix = '';
  if(beforeText.length === 0){ prefix = ''; }
  else if(beforeText.endsWith('\n\n')){ prefix = ''; }
  else if(beforeText.endsWith('\n')){ prefix = '\n'; }
  else { prefix = '\n\n'; }

  const afterText = value.slice(end);
  let suffix = '';
  if(afterText.length === 0){ suffix = ''; }
  else if(afterText.startsWith('\n\n')){ suffix = ''; }
  else if(afterText.startsWith('\n')){ suffix = '\n'; }
  else { suffix = '\n\n'; }

  // 改ページなし。その場の1段落だけを横方向中央寄せにする。
  // 章扉と同じ新方式(div.middle/div.title)。markdown="1"やspanは使わない。
  const openTag = '<div class="middle">\n<div class="title">';
  const closeTag = '</div>\n</div>';
  const line = openTag + selected + closeTag;
  const insertText = prefix + line + suffix;
  replaceRange(start, end, insertText);

  const textStart = start + prefix.length + openTag.length;
  const textEnd = textStart + selected.length;
  editor.setSelectionRange(textStart, textEnd);
  updateCount(); scheduleSave(); schedulePreview();
}

function handleAction(action, snippet, level){
  const scrollTop = editor.scrollTop; // 挿入処理でスクロール位置が飛ぶのを防ぐため、事前に保存
  switch(action){
    case 'pagebreak': insertBlock('=============='); break;
    case 'blankline': insertBlock('<p><br /></p>'); break;
    case 'ruby': insertRuby(); break;
    case 'bouten': wrapSelection('*', '*', '強調'); break;
    case 'heading': insertHeadingBlock(level); break;
    case 'tcy': wrapSelection('^', '^', '53'); break;
    case 'link': insertLink(); break;
    case 'image': insertImage(); break;
    case 'divider': insertDividerPage(); break;
    case 'centertext': insertCenterText(); break;
    case 'custom': insertAtCursorRaw(snippet); break;
  }
  editor.scrollTop = scrollTop; // 保存したスクロール位置に戻す
}

function insertAtCursorRaw(text){
  const start = editor.selectionStart, end = editor.selectionEnd;
  replaceRange(start, end, text);
  const cursorPos = start + text.length;
  editor.setSelectionRange(cursorPos, cursorPos);
  updateCount(); scheduleSave(); schedulePreview();
}


toolbar.addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-action]');
  if(!btn) return;
  handleAction(btn.dataset.action, btn.dataset.snippet, btn.dataset.level);
});

/* ===== カスタムボタン ===== */
async function loadCustomButtons(){
  try{
    const result = await storage.get(BUTTONS_KEY);
    return result ? JSON.parse(result.value) : [];
  }catch(e){ return []; }
}
async function saveCustomButtons(list){
  try{ await storage.set(BUTTONS_KEY, JSON.stringify(list)); }catch(e){}
}
function renderCustomButton(item, index){
  const group = document.createElement('span');
  group.className = 'custom-btn-group';
  const btn = document.createElement('button');
  btn.textContent = item.label;
  btn.dataset.action = 'custom';
  btn.dataset.snippet = item.snippet;
  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', async (e)=>{
    e.stopPropagation();
    const list = await loadCustomButtons();
    list.splice(index, 1);
    await saveCustomButtons(list);
    refreshCustomButtons();
  });
  group.appendChild(btn);
  group.appendChild(removeBtn);
  return group;
}
async function refreshCustomButtons(){
  document.querySelectorAll('.custom-btn-group').forEach(el => el.remove());
  const list = await loadCustomButtons();
  const addBtn = document.getElementById('addBtn');
  list.forEach((item, i)=> toolbar.insertBefore(renderCustomButton(item, i), addBtn));
}

const modalBackdrop = document.getElementById('modalBackdrop');
const modalLabel = document.getElementById('modalLabel');
const modalSnippet = document.getElementById('modalSnippet');

document.getElementById('addBtn').addEventListener('click', ()=>{
  modalLabel.value = ''; modalSnippet.value = '';
  modalBackdrop.classList.add('show');
  modalLabel.focus();
});
document.getElementById('modalCancel').addEventListener('click', ()=> modalBackdrop.classList.remove('show'));
modalBackdrop.addEventListener('click', (e)=>{ if(e.target === modalBackdrop) modalBackdrop.classList.remove('show'); });
document.getElementById('modalSave').addEventListener('click', async ()=>{
  const label = modalLabel.value.trim();
  const snippet = modalSnippet.value;
  if(!label || !snippet){ showToast('表示名と記法の両方を入力してください'); return; }
  const list = await loadCustomButtons();
  list.push({ label, snippet });
  await saveCustomButtons(list);
  modalBackdrop.classList.remove('show');
  refreshCustomButtons();
  showToast('ボタンを追加しました');
});

/* ===== その他操作 ===== */
document.getElementById('copyBtn').addEventListener('click', async ()=>{
  try{ await navigator.clipboard.writeText(editor.value); showToast('コピーしました'); }
  catch(e){ editor.select(); document.execCommand('copy'); showToast('コピーしました'); }
});
document.getElementById('downloadBtn').addEventListener('click', async ()=>{
  const text = editor.value;
  if(!text){ showToast('本文は空です'); return; }

  // スマホのサンドボックス環境ではBlobの直接ダウンロードが動かない場合があるため、
  // まずOSの共有シート（ファイルとして共有）を試す。
  try{
    if(navigator.canShare && navigator.share){
      const file = new File([text], 'manuscript.txt', { type: 'text/plain' });
      if(navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: 'manuscript.txt' });
        showToast('共有しました');
        return;
      }
    }
  }catch(err){
    // ユーザーが共有をキャンセルした場合もここに来るので、何もしない
    if(err && err.name === 'AbortError'){ return; }
  }

  // 共有が使えない環境ではBlobダウンロードを試す
  try{
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'manuscript.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('保存しました');
    return;
  }catch(err){}

  // どちらも使えない場合はクリップボードにコピーして案内
  try{
    await navigator.clipboard.writeText(text);
    showToast('この環境では保存できないため、コピーしました。メモ等に貼り付けてください');
  }catch(err){
    showToast('保存に失敗しました。「全文コピー」をお試しください');
  }
});
document.getElementById('copyCssBtn').addEventListener('click', async ()=>{
  try{ await navigator.clipboard.writeText(DEFAULT_VERTICAL_CSS); showToast('CSSをコピーしました'); }
  catch(e){
    // クリップボードAPIが使えない環境向けのフォールバック

  }
});

  // スマホのサンドボックス環境ではBlobの直接ダウンロードが動かない場合があるため、
  // まずOSの共有シート（ファイルとして共有）を試す。

});
document.getElementById('batchTcyBtn').addEventListener('click', ()=>{
  const text = editor.value;
  if(!text){ showToast('本文は空です'); return; }
  const scrollTop = editor.scrollTop;

  // すでに ^...^ で囲まれている範囲は対象から除外するため、一時的に退避する
  const placeholders = [];
  let temp = text.replace(/\^[^^]*\^/g, (m)=>{
    placeholders.push(m);
    return '\u0000' + (placeholders.length - 1) + '\u0000';
  });

  let count = 0;
  // 半角／全角の ! ? が2〜4文字連続している部分を縦中横に変換（例: !? !! ?? !!? など）
  temp = temp.replace(/([!?！？]{2,4})/g, (m)=>{
    count++;
    return '^' + m + '^';
  });

  temp = temp.replace(/\u0000(\d+)\u0000/g, (m, idx)=> placeholders[parseInt(idx, 10)]);

  if(count === 0){
    showToast('変換できる箇所が見つかりませんでした');
    return;
  }
  replaceRange(0, text.length, temp);
  updateCount(); scheduleSave(); schedulePreview();
  editor.scrollTop = scrollTop;
  showToast(count + '箇所を縦中横に変換しました');
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(editor.value.length === 0){ showToast('本文は空です'); return; }
  document.getElementById('clearModalBackdrop').classList.add('show');
});
document.getElementById('clearCancel').addEventListener('click', ()=>{
  document.getElementById('clearModalBackdrop').classList.remove('show');
});
document.getElementById('clearModalBackdrop').addEventListener('click', (e)=>{
  if(e.target.id === 'clearModalBackdrop') e.target.classList.remove('show');
});
document.getElementById('clearConfirm').addEventListener('click', ()=>{
  replaceRange(0, editor.value.length, '');
  updateCount(); scheduleSave(); schedulePreview();
  document.getElementById('clearModalBackdrop').classList.remove('show');
  showToast('消去しました（⌘Zで元に戻せます）');
});

document.querySelectorAll('.tab').forEach(tab=>{

/* ===== 初期化（前回の続きを復元／変換ツールからの引き継ぎ確認） ===== */
async function checkHandoff(){
  let handoffText = null;
  try{ handoffText = localStorage.getItem(HANDOFF_KEY); }catch(e){}
  if(!handoffText) return;

  const backdrop = document.getElementById('handoffModalBackdrop');
  backdrop.classList.add('show');

  const cleanup = ()=>{
    try{ localStorage.removeItem(HANDOFF_KEY); }catch(e){}
    backdrop.classList.remove('show');
  };
  document.getElementById('handoffLoad').onclick = ()=>{
    editor.value = handoffText;
    updateCount(); scheduleSave(); schedulePreview();
    cleanup();
    showToast('変換ツールの原稿を読み込みました');
  };
  document.getElementById('handoffSkip').onclick = cleanup;
}

async function init(){
  try{
    const saved = await storage.get(CONTENT_KEY);
    if(saved && saved.value){
      editor.value = saved.value;
      showToast('前回の続きを読み込みました');
    }
  }catch(e){}
  updateCount();
  refreshCustomButtons();
  await checkHandoff();
}
init();

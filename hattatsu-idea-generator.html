<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発達支援 困りごと解析ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Serif+JP:wght@300;400;600&display=swap');

  :root {
    --bg: #faf7f2;
    --paper: #ffffff;
    --ink: #2c2416;
    --ink-light: #6b5c45;
    --accent: #c4611a;
    --accent-soft: #f0d5bb;
    --accent2: #3a7d6e;
    --accent2-soft: #c8e6e1;
    --line: #e8ddd0;
    --shadow: rgba(44,36,22,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
    background-image: 
      radial-gradient(circle at 15% 20%, rgba(196,97,26,0.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(58,125,110,0.06) 0%, transparent 50%);
  }

  header {
    background: var(--ink);
    color: #faf7f2;
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(196,97,26,0.18);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40%;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(58,125,110,0.15);
  }

  .header-inner { position: relative; z-index: 1; }

  .header-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  header p {
    font-size: 12px;
    color: #b8aa99;
    line-height: 1.7;
  }

  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* Input section */
  .input-card {
    background: var(--paper);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 16px var(--shadow);
    margin-bottom: 24px;
    border: 1px solid var(--line);
  }

  .input-card label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  /* Chips */
  .chip-section {
    margin-bottom: 16px;
  }

  .chip-title {
    font-size: 11px;
    color: var(--ink-light);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--line);
    background: transparent;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .chip.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  textarea {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
    background: var(--bg);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 90px;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #bbb; }

  .btn-run {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-run:hover { background: #a84e14; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(196,97,26,0.3); }
  .btn-run:active { transform: translateY(0); }
  .btn-run:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .loading.show { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { font-size: 13px; color: var(--ink-light); }

  /* Result */
  .result-area { display: none; }
  .result-area.show { display: block; }

  /* Flow diagram */
  .flow {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 24px;
  }

  .flow-step {
    background: var(--paper);
    border-radius: 14px;
    border: 1px solid var(--line);
    padding: 20px;
    box-shadow: 0 2px 10px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .flow-step:nth-child(1) { animation-delay: 0.05s; }
  .flow-step:nth-child(3) { animation-delay: 0.15s; }
  .flow-step:nth-child(5) { animation-delay: 0.25s; }
  .flow-step:nth-child(7) { animation-delay: 0.35s; }

  .flow-arrow {
    text-align: center;
    padding: 6px 0;
    color: var(--accent);
    font-size: 20px;
  }

  .step-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .step-label.problem { background: #fde8d8; color: var(--accent); }
  .step-label.cause { background: #fff3cd; color: #7a5c00; }
  .step-label.idea { background: var(--accent2-soft); color: var(--accent2); }
  .step-label.design { background: #e8e0f0; color: #5a3e8a; }

  .step-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .step-body {
    font-size: 13px;
    line-height: 1.85;
    color: var(--ink-light);
  }

  .step-body ul {
    list-style: none;
    padding: 0;
  }

  .step-body ul li {
    padding: 4px 0 4px 18px;
    position: relative;
  }

  .step-body ul li::before {
    content: '・';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .design-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .design-tag {
    background: #e8e0f0;
    color: #5a3e8a;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid #c9bde8;
  }

  .error-msg {
    background: #fde8d8;
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.7;
  }

  .retry-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: transparent;
    border: 2px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover { background: var(--accent); color: white; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-label">発達支援 × デザイン</div>
    <h1>困りごと解析ツール</h1>
    <p>子どもの困りごとを入力すると、<br>背景要因と支援アイデアを分析します</p>
  </div>
</header>

<div class="main">

  <div class="input-card">
    <label>🌱 困りごとを選ぶか、自由に入力してください</label>

    <div class="chip-section">
      <div class="chip-title">よくある困りごと（タップで入力）</div>
      <div class="chips">
        <button class="chip" onclick="setExample('癇癪を起こす')">癇癪を起こす</button>
        <button class="chip" onclick="setExample('切り替えができない')">切り替えができない</button>
        <button class="chip" onclick="setExample('順番が待てない')">順番が待てない</button>
        <button class="chip" onclick="setExample('集団行動が苦手')">集団行動が苦手</button>
        <button class="chip" onclick="setExample('字を書くのが極端に遅い')">字を書くのが極端に遅い</button>
        <button class="chip" onclick="setExample('友達との関わり方がわからない')">友達との関わり方がわからない</button>
        <button class="chip" onclick="setExample('音や光に過敏に反応する')">音や光に過敏に反応する</button>
        <button class="chip" onclick="setExample('忘れ物が多い')">忘れ物が多い</button>
      </div>
    </div>

    <textarea id="input" placeholder="例：癇癪を起こす、集中が続かない、着替えを嫌がる…" rows="3"></textarea>
    <button class="btn-run" id="runBtn" onclick="analyze()">🔍 解析する</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>背景要因とアイデアを分析中…</p>
  </div>

  <div class="result-area" id="result"></div>

</div>

<script>
function setExample(text) {
  document.getElementById('input').value = text;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  event.target.classList.add('selected');
}

async function analyze() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;

  const runBtn = document.getElementById('runBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');

  runBtn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  result.innerHTML = '';

  const systemPrompt = `あなたは発達障害・発達支援の専門知識を持つアドバイザーです。
子どもの困りごとについて、以下の3段階で分析し、必ずJSONのみで返答してください。

返答形式（JSON only、前置き・コードブロック不要）:
{
  "problem": "入力された困りごとをわかりやすく言い換えたもの",
  "causes": ["背景要因1", "背景要因2", "背景要因3"],
  "cause_detail": "背景要因の説明（2〜3文）",
  "ideas": ["支援アイデア1", "支援アイデア2", "支援アイデア3"],
  "design_types": ["ポスター", "カード"]  // 具体的な視覚支援素材の種類（2〜4個）
}

- causesは発達特性に基づく背景要因（感覚・認知・実行機能など）
- ideasは保護者・支援者がすぐ試せる具体的な支援
- design_typesはデザインで作れる視覚支援素材の種類のみ（例：タイムタイムテーブル、絵カード、見通しポスター、感情カード、ルーティン表など）`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: input }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResult(parsed);
  } catch (err) {
    result.innerHTML = `
      <div class="error-msg">
        ⚠️ 分析中にエラーが発生しました。<br>
        もう一度試してみてください。
      </div>
      <button class="retry-btn" onclick="analyze()">もう一度試す</button>
    `;
    result.classList.add('show');
  } finally {
    runBtn.disabled = false;
    loading.classList.remove('show');
  }
}

function renderResult(d) {
  const result = document.getElementById('result');

  const causeItems = d.causes.map(c => `<li>${c}</li>`).join('');
  const ideaItems = d.ideas.map(i => `<li>${i}</li>`).join('');
  const designTags = d.design_types.map(t => `<span class="design-tag">📄 ${t}</span>`).join('');

  result.innerHTML = `
    <div class="flow">
      <div class="flow-step">
        <div class="step-label problem">困りごと</div>
        <div class="step-title">${d.problem}</div>
      </div>

      <div class="flow-arrow">▼</div>

      <div class="flow-step">
        <div class="step-label cause">背景要因</div>
        <div class="step-title">なぜ起きているのか？</div>
        <div class="step-body">
          <ul>${causeItems}</ul>
          <p style="margin-top:10px">${d.cause_detail}</p>
        </div>
      </div>

      <div class="flow-arrow">▼</div>

      <div class="flow-step">
        <div class="step-label idea">支援アイデア</div>
        <div class="step-title">できることから始めてみよう</div>
        <div class="step-body"><ul>${ideaItems}</ul></div>
      </div>

      <div class="flow-arrow">▼</div>

      <div class="flow-step">
        <div class="step-label design">視覚支援デザイン</div>
        <div class="step-title">こんな素材があると助かる</div>
        <div class="step-body">
          <div class="design-tags">${designTags}</div>
        </div>
      </div>
    </div>
  `;

  result.classList.add('show');
}
</script>
</body>
</html>
